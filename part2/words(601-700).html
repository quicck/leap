<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>英単語テスト</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }
    header {
      background: #1976d2;
      color: #fff;
      padding: 12px 20px;
      font-size: 20px;
    }
    main {
      max-width: 900px;
      margin: 20px auto 40px;
      background: #fff;
      padding: 20px 24px 30px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      border-radius: 6px;
    }
    h1, h2, h3 {
      margin-top: 0;
    }
    button {
      cursor: pointer;
      border-radius: 4px;
      border: none;
      padding: 8px 16px;
      margin: 4px;
      font-size: 14px;
    }
    .btn-primary {
      background: #1976d2;
      color: #fff;
    }
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    .btn-danger {
      background: #d32f2f;
      color: #fff;
    }
    .btn-option {
      display: block;
      width: 100%;
      text-align: left;
      margin: 6px 0;
      background: #fafafa;
      border: 1px solid #ccc;
    }
    .btn-option.correct {
      background: #c8e6c9;
      border-color: #2e7d32;
    }
    .btn-option.incorrect {
      background: #ffcdd2;
      border-color: #c62828;
    }
    .status {
      margin-top: 10px;
      font-weight: bold;
    }
    .status.correct {
      color: #2e7d32;
    }
    .status.incorrect {
      color: #c62828;
    }
    .question-meta {
      margin-bottom: 10px;
      color: #555;
    }
    .input-answer {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      box-sizing: border-box;
      margin: 6px 0 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      font-size: 14px;
    }
    th {
      background: #eeeeee;
    }
    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
      margin-left: 4px;
    }
    .tag-correct {
      background: #c8e6c9;
      color: #2e7d32;
    }
    .tag-incorrect {
      background: #ffcdd2;
      color: #c62828;
    }
    .flex {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<header>英単語テスト</header>
<main>
  <!-- Top Page -->
  <section id="page-home">
    <h1>モードを選択</h1>
    <p>学習したいモードを選んでください。</p>
    <div class="flex">
      <button class="btn-primary" onclick="startMode('mcq')">4択問題</button>
      <button class="btn-primary" onclick="startMode('writing')">記述問題</button>
      <button class="btn-secondary" onclick="showWordList()">単語一覧</button>
    </div>
  </section>

  <!-- MCQ Page -->
  <section id="page-mcq" class="hidden">
    <h2>4択問題</h2>
    <div class="question-meta" id="mcq-meta"></div>
    <div id="mcq-question"></div>
    <div id="mcq-options"></div>
    <div id="mcq-status" class="status"></div>
    <div class="flex">
      <button class="btn-secondary" onclick="nextQuestion('mcq')">次の問題へ</button>
      <button class="btn-danger" onclick="finishSetEarly('mcq')">途中で終了</button>
      <button class="btn-secondary" onclick="backToHome()">トップへ戻る</button>
    </div>
  </section>

  <!-- Writing Page -->
  <section id="page-writing" class="hidden">
    <h2>記述問題</h2>
    <div class="question-meta" id="writing-meta"></div>
    <div id="writing-question"></div>
    <input id="writing-input" class="input-answer" type="text" placeholder="英単語を入力">
    <div class="flex">
      <button class="btn-primary" onclick="checkWritingAnswer()">答え合わせ</button>
      <button class="btn-secondary" onclick="nextQuestion('writing')">次の問題へ</button>
      <button class="btn-danger" onclick="finishSetEarly('writing')">途中で終了</button>
      <button class="btn-secondary" onclick="backToHome()">トップへ戻る</button>
    </div>
    <div id="writing-status" class="status"></div>
  </section>

  <!-- Summary Page -->
  <section id="page-summary" class="hidden">
    <h2>セット結果</h2>
    <div id="summary-info"></div>
    <div id="summary-table"></div>
    <div class="flex">
      <button class="btn-primary" onclick="restartSameMode()">同じモードでもう一度</button>
      <button class="btn-secondary" onclick="backToHome()">トップへ戻る</button>
    </div>
  </section>

  <!-- Word List Page -->
  <section id="page-wordlist" class="hidden">
    <h2>単語一覧</h2>
    <p>学習用に、全ての単語を順番通りに表示しています。</p>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>英単語</th>
          <th>日本語</th>
        </tr>
      </thead>
      <tbody id="wordlist-body"></tbody>
    </table>
    <div class="flex">
      <button class="btn-secondary" onclick="backToHome()">トップへ戻る</button>
    </div>
  </section>
</main>

<script>
  const words = [
    { en: "persuade", ja: "（Aを）説得して〜させる" },
    { en: "convince", ja: "（AにBを）納得させる" },
    { en: "inspire", ja: "〜を奮起させる" },

    { en: "promote", ja: "〜を促進する" },
    { en: "boost", ja: "〜を促進させる、増大させる" },
    { en: "expand", ja: "〜を拡大する、発展させる" },

    { en: "obey", ja: "〜に従う" },
    { en: "engage", ja: "（活動）に従事する" },
    { en: "bump", ja: "（〜に）ぶつかる" },
    { en: "bend", ja: "身をかがめる" },
    { en: "hug", ja: "（人）を抱きしめる" },
    { en: "stare", ja: "じっと見つめる" },
    { en: "gaze", ja: "じっと見つめる" },
    { en: "glance", ja: "ちらりと見る" },
    { en: "glimpse", ja: "ちらりと見える" },
    { en: "stretch", ja: "（手足や体を）伸ばす" },
    { en: "stumble", ja: "つまずく" },
    { en: "press", ja: "〜を（ぐいぐい）押す" },
    { en: "drag", ja: "〜を（ずるずると）引きずる" },
    { en: "lean", ja: "（〜に）寄りかかる" },
    { en: "scratch", ja: "〜をひっかく" },
    { en: "bow", ja: "おじぎをする" },
    { en: "nod", ja: "うなずく" },
    { en: "sigh", ja: "ため息をつく" },
    { en: "yawn", ja: "あくびをする" },
    { en: "sneeze", ja: "くしゃみをする" },
    { en: "bury", ja: "〜を埋める" },
    { en: "perform", ja: "〜を遂行する" },
    { en: "adopt", ja: "〜を採用する" },
    { en: "escape", ja: "（from〜）〜から逃れる" },
    { en: "scatter", ja: "〜をまき散らす" },
    { en: "fold", ja: "〜を折る" },
    { en: "hang", ja: "〜を掛ける" },
    { en: "release", ja: "〜を放す" },
    { en: "strike", ja: "〜を打つ" },
    { en: "beat", ja: "〜を打つ" },
    { en: "protect", ja: "〜を守る" },
    { en: "twist", ja: "〜をねじ曲げる" },
    { en: "skip", ja: "〜をサボる、抜かす" },
    { en: "expose", ja: "〜をさらす" },
    { en: "stir", ja: "（液体など）を混ぜる" },
    { en: "shake", ja: "振る、揺れる" },
    { en: "polish", ja: "〜を磨く" },
    { en: "attend", ja: "〜に出席する" },
    { en: "imitate", ja: "〜をまねる" },
    { en: "conduct", ja: "〜を行う" },
    { en: "struggle", ja: "苦闘する" },
    { en: "burn", ja: "（火が燃える）燃える" },

    { en: "require", ja: "〜を必要とする" },
    { en: "counterpart", ja: "（〜の）対応するもの" },

    { en: "maintain", ja: "〜を維持する" },
    { en: "last", ja: "（時間的に）続く" },
    { en: "persist", ja: "持続する" },
    { en: "examine", ja: "〜を調査する" },
    { en: "gain", ja: "〜を増す" },
    { en: "obtain", ja: "〜を得る" },
    { en: "acquire", ja: "〜を習得する" },
    { en: "search", ja: "A for B：B（物）を求めてA（場所）を捜す" },
    { en: "logical", ja: "論理的な" },
    { en: "scholarship", ja: "奨学金" },
    { en: "instruction", ja: "（通例〜s）指示" },
    { en: "determine", ja: "〜を決定する" },
    { en: "conclude", ja: "（that SV）〜と結論を下す" },
    { en: "distinguish", ja: "〜を区別する" },
    { en: "classify", ja: "〜を分類する" },
    { en: "estimate", ja: "〜を推定する、見積もる" },
    { en: "organize", ja: "（考えなど）をまとめる" },
    { en: "recognize", ja: "（知り合いなど）が誰だかわかる" },
    { en: "suppose", ja: "（be〜d to do）〜することになっている" },
    { en: "assume", ja: "〜と思い込む" },
    { en: "care", ja: "（否定文で）気にする" },
    { en: "approve", ja: "（of〜）〜を認める" },
    { en: "notice", ja: "〜に気がついている" },
    { en: "aware", ja: "気づいている" },
    { en: "conscious", ja: "意識している" },
    { en: "concerned", ja: "（with/about）〜に関心を持っている、懸念している" },
    { en: "regard", ja: "（A as B）AをBとみなす" },
    { en: "commit", ja: "（oneself to〜）に専念する" },
    { en: "doubt", ja: "〜を疑う" },
    { en: "memorize", ja: "〜を暗記する" },
    { en: "forgive", ja: "（人）を許す" },
    { en: "grant", ja: "～を与える、許可する" },
    { en: "recall", ja: "～を思い出す" },
    { en: "outlook", ja: "（人の人生、世界などに対する）考え方" }
  ];

  const SET_SIZE = 10;

  let currentMode = null; // 'mcq' or 'writing'
  let currentSet = [];
  let currentIndex = 0;
  let results = []; // { word, correct, userAnswer, correctAnswer }
  let answeredCurrent = false;

  function hideAllPages() {
    document.getElementById('page-home').classList.add('hidden');
    document.getElementById('page-mcq').classList.add('hidden');
    document.getElementById('page-writing').classList.add('hidden');
    document.getElementById('page-summary').classList.add('hidden');
    document.getElementById('page-wordlist').classList.add('hidden');
  }

  function backToHome() {
    hideAllPages();
    document.getElementById('page-home').classList.remove('hidden');
  }

  function shuffle(array) {
    const arr = array.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function pickSet() {
    const shuffled = shuffle(words);
    return shuffled.slice(0, SET_SIZE);
  }

  function startMode(mode) {
    currentMode = mode;
    currentSet = pickSet();
    currentIndex = 0;
    results = [];
    answeredCurrent = false;

    hideAllPages();
    if (mode === 'mcq') {
      document.getElementById('page-mcq').classList.remove('hidden');
      renderMcqQuestion();
    } else {
      document.getElementById('page-writing').classList.remove('hidden');
      renderWritingQuestion();
    }
  }

  function renderMcqQuestion() {
    const meta = document.getElementById('mcq-meta');
    const qDiv = document.getElementById('mcq-question');
    const optDiv = document.getElementById('mcq-options');
    const status = document.getElementById('mcq-status');

    if (currentIndex >= currentSet.length) {
      showSummary();
      return;
    }

    const q = currentSet[currentIndex];
    meta.textContent = `問題 ${currentIndex + 1} / ${SET_SIZE}`;
    qDiv.textContent = `「${q.en}」の意味として最も近いものを選びなさい。`;

    // 作成：4択
    const options = [q];
    const others = shuffle(words.filter(w => w.en !== q.en)).slice(0, 3);
    options.push(...others);
    const shuffledOptions = shuffle(options);

    optDiv.innerHTML = '';
    shuffledOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-option';
      btn.textContent = opt.ja;
      btn.onclick = () => checkMcqAnswer(opt, q, btn, optDiv);
      optDiv.appendChild(btn);
    });

    status.textContent = '';
    status.className = 'status';
    answeredCurrent = false;
  }

  function checkMcqAnswer(selected, correctWord, btn, optDiv) {
    if (answeredCurrent) return;
    answeredCurrent = true;

    const status = document.getElementById('mcq-status');
    const buttons = optDiv.querySelectorAll('button');

    buttons.forEach(b => {
      if (b.textContent === correctWord.ja) {
        b.classList.add('correct');
      }
    });

    let isCorrect = selected.en === correctWord.en;
    if (!isCorrect) {
      btn.classList.add('incorrect');
    }

    status.textContent = isCorrect ? "正解！" : `不正解… 正しい答え：${correctWord.ja}`;
    status.classList.add(isCorrect ? 'correct' : 'incorrect');

    results.push({
      word: correctWord,
      correct: isCorrect,
      userAnswer: selected.ja,
      correctAnswer: correctWord.ja
    });
  }

  function renderWritingQuestion() {
    const meta = document.getElementById('writing-meta');
    const qDiv = document.getElementById('writing-question');
    const input = document.getElementById('writing-input');
    const status = document.getElementById('writing-status');

    if (currentIndex >= currentSet.length) {
      showSummary();
      return;
    }

    const q = currentSet[currentIndex];
    meta.textContent = `問題 ${currentIndex + 1} / ${SET_SIZE}`;
    qDiv.textContent = `次の日本語に対応する英単語を入力しなさい： 「${q.ja}」`;
    input.value = '';
    input.focus();
    status.textContent = '';
    status.className = 'status';
    answeredCurrent = false;
  }

  function checkWritingAnswer() {
    if (answeredCurrent) return;
    const input = document.getElementById('writing-input');
    const status = document.getElementById('writing-status');
    const q = currentSet[currentIndex];

    const user = input.value.trim();
    if (!user) {
      status.textContent = "答えを入力してください。";
      status.className = 'status incorrect';
      return;
    }

    const isCorrect = user.toLowerCase() === q.en.toLowerCase();
    status.textContent = isCorrect
      ? "正解！"
      : `不正解… 正しい答え：${q.en}`;
    status.classList.add(isCorrect ? 'correct' : 'incorrect');

    results.push({
      word: q,
      correct: isCorrect,
      userAnswer: user,
      correctAnswer: q.en
    });

    answeredCurrent = true;
  }

  function nextQuestion(mode) {
    if (currentIndex >= currentSet.length) {
      showSummary();
      return;
    }
    currentIndex++;
    if (currentIndex >= currentSet.length) {
      showSummary();
      return;
    }
    answeredCurrent = false;
    if (mode === 'mcq') {
      renderMcqQuestion();
    } else {
      renderWritingQuestion();
    }
  }

  function finishSetEarly(mode) {
    // まだ結果に入っていない現在の問題は無視して終了
    showSummary();
  }

  function showSummary() {
    hideAllPages();
    document.getElementById('page-summary').classList.remove('hidden');

    const info = document.getElementById('summary-info');
    const tableDiv = document.getElementById('summary-table');

    const total = results.length;
    const correctCount = results.filter(r => r.correct).length;

    info.innerHTML = `
      <p>このセットで解いた問題数：${total} 問（最大 ${SET_SIZE} 問）</p>
      <p>正解数：${correctCount} / ${total}</p>
    `;

    if (total === 0) {
      tableDiv.innerHTML = "<p>まだ問題を解いていません。</p>";
      return;
    }

    let html = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>英単語</th>
            <th>日本語</th>
            <th>あなたの答え</th>
            <th>正誤</th>
          </tr>
        </thead>
        <tbody>
    `;

    results.forEach((r, idx) => {
      html += `
        <tr>
          <td>${idx + 1}</td>
          <td>${r.word.en}</td>
          <td>${r.word.ja}</td>
          <td>${r.userAnswer}</td>
          <td>
            ${r.correct ? "○" : "×"}
            <span class="tag ${r.correct ? 'tag-correct' : 'tag-incorrect'}">
              ${r.correct ? "正解" : "不正解"}
            </span>
          </td>
        </tr>
      `;
    });

    html += "</tbody></table>";
    tableDiv.innerHTML = html;
  }

  function restartSameMode() {
    if (!currentMode) {
      backToHome();
      return;
    }
    startMode(currentMode);
  }

  function showWordList() {
    hideAllPages();
    document.getElementById('page-wordlist').classList.remove('hidden');

    const tbody = document.getElementById('wordlist-body');
    tbody.innerHTML = '';
    words.forEach((w, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${idx + 1}</td>
        <td>${w.en}</td>
        <td>${w.ja}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Enterキーで記述問題の答え合わせ
  document.addEventListener('keydown', (e) => {
    if (currentMode === 'writing' && !document.getElementById('page-writing').classList.contains('hidden')) {
      if (e.key === 'Enter') {
        e.preventDefault();
        checkWritingAnswer();
      }
    }
  });

  // 初期表示
  backToHome();
</script>

    <script>
        // Data Source
        const vocabularyData = [
            { en: "persuade", jp: "（A を）説得して〜させる" },
            { en: "convince", jp: "（A に B を）納得させる" },
            { en: "inspire", jp: "〜を奮起させる" },

            { en: "escape", jp: "（from〜）〜から逃れる" },

            { en: "protect", jp: "〜を守る" },

            { en: "skip", jp: "〜をサボる、抜かす" },
            { en: "expose", jp: "〜をさらす" },
            { en: "stir", jp: "（液体など）を混ぜる" },
            { en: "shake", jp: "振る、揺れる" },
            { en: "polish", jp: "〜を磨く" },
            { en: "attend", jp: "〜に出席する" },

            { en: "conduct", jp: "〜を行う" },
            { en: "struggle", jp: "苦闘する" },
            { en: "burn", jp: "（火が燃える）燃える" },
            { en: "cheat", jp: "ごまかす" },
            { en: "participate", jp: "（in〜）〜に参加する" },
            { en: "exist", jp: "（物・人などが）存在する" },
            { en: "arise", jp: "arise from〜（〜から）生じる" },
            { en: "occur", jp: "（問題、事件、考えなどが）起こる" },
            { en: "involve", jp: "（be -d in〜）事件などに巻き込まれる" },
            { en: "require", jp: "〜を必要とする" },
            { en: "counterpart", jp: "（〜の）対応するもの" },
            { en: "advent", jp: "（the A〜）〜の到来、出現" },
            { en: "maintain", jp: "〜を維持する" },
            { en: "last", jp: "（時間的に）続く" },
            { en: "persist", jp: "持続する" },
            { en: "examine", jp: "〜を調査する" },
            { en: "gain", jp: "〜を増す" },
            { en: "obtain", jp: "〜を得る" },
            { en: "acquire", jp: "〜を習得する" },
            { en: "search", jp: "A for B：B（物）を求めて A（場所）を捜す" },
            { en: "logical", jp: "論理的な" },
            { en: "scholarship", jp: "奨学金" },
            { en: "instruction", jp: "（通例〜s）指示" },
            { en: "determine", jp: "〜を決定する" },
            { en: "conclude", jp: "（that SV）〜と結論を下す" },
            { en: "distinguish", jp: "〜を区別する" },
            { en: "classify", jp: "〜を分類する" },
            { en: "estimate", jp: "〜を推定する、見積もる" },
            { en: "organize", jp: "（考えなど）をまとめる" },
            { en: "recognize", jp: "（知り合いなど）が誰だかわかる" },
            { en: "suppose", jp: "（be〜d to do）〜することになっている" },
            { en: "assume", jp: "〜と思い込む" },
            { en: "care", jp: "（否定文で）気にする" },
            { en: "approve", jp: "（of〜）〜を認める" },
            { en: "notice", jp: "〜に気がついている" },
            { en: "aware", jp: "気づいている" },
            { en: "conscious", jp: "意識している" },
            { en: "concerned", jp: "（with/about）〜に関心を持っている、懸念している" },
            { en: "regard", jp: "（A as B）A を B とみなす" },
            { en: "commit", jp: "（oneself to〜）に専念する" },
            { en: "doubt", jp: "〜を疑う" },
            { en: "memorize", jp: "〜を暗記する" },
            { en: "forgive", jp: "（人）を許す" },
            { en: "grant", jp: "～を与える、許可する" },
            { en: "recall", jp: "～を思い出す" },
            { en: "outlook", jp: "（人の人生、世界などに対する）考え方" }
        ];

        // Application Logic
        const app = {
            state: {
                currentScreen: 'home',
                quizType: null,
                currentSet: [],
                currentIndex: 0,
                score: 0,
                userAnswers: [],
                pendingNext: false // Flag to prevent double clicks
            },

            init: function() {
                this.showHome();
            },

            showHome: function() {
                this.state.currentScreen = 'home';
                const container = document.getElementById('app-container');
                container.innerHTML = `
                    <div class="max-w-4xl mx-auto text-center fade-in">
                        <h2 class="text-3xl font-bold text-gray-800 mb-8">学習モードを選択</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <!-- 4 択問題 -->
                            <div onclick="app.startQuiz('choice')" class="bg-white p-8 rounded-xl shadow-md cursor-pointer card-hover transition border-t-4 border-blue-500">
                                <div class="text-blue-500 mb-4 flex justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                                    </svg>
                                </div>
                                <h3 class="text-xl font-bold mb-2">4 択問題</h3>
                                <p class="text-gray-600 text-sm">英単語を見て、正しい日本語の意味を選びます。</p>
                            </div>

                            <!-- 記述問題 -->
                            <div onclick="app.startQuiz('input')" class="bg-white p-8 rounded-xl shadow-md cursor-pointer card-hover transition border-t-4 border-green-500">
                                <div class="text-green-500 mb-4 flex justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                </div>
                                <h3 class="text-xl font-bold mb-2">記述問題</h3>
                                <p class="text-gray-600 text-sm">日本語の意味を見て、正しい英単語を入力します。</p>
                            </div>

                            <!-- 単語一覧 -->
                            <div onclick="app.showList()" class="bg-white p-8 rounded-xl shadow-md cursor-pointer card-hover transition border-t-4 border-purple-500">
                                <div class="text-purple-500 mb-4 flex justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                                    </svg>
                                </div>
                                <h3 class="text-xl font-bold mb-2">単語一覧</h3>
                                <p class="text-gray-600 text-sm">全ての単語リストを確認できます。</p>
                            </div>
                        </div>
                    </div>
                `;
            },

            startQuiz: function(type) {
                this.state.quizType = type;
                this.state.currentScreen = type === 'choice' ? 'quiz-choice' : 'quiz-input';
                this.state.score = 0;
                this.state.currentIndex = 0;
                this.state.userAnswers = [];
                this.state.pendingNext = false;
                
                const shuffled = [...vocabularyData].sort(() => 0.5 - Math.random());
                this.state.currentSet = shuffled.slice(0, 10);

                this.renderQuestion();
            },

            renderQuestion: function() {
                const container = document.getElementById('app-container');
                const currentQ = this.state.currentSet[this.state.currentIndex];
                const progress = ((this.state.currentIndex) / 10) * 100;

                if (this.state.quizType === 'choice') {
                    const distractors = vocabularyData
                        .filter(w => w.en !== currentQ.en)
                        .sort(() => 0.5 - Math.random())
                        .slice(0, 3);
                    
                    const options = [currentQ, ...distractors].sort(() => 0.5 - Math.random());

                    let optionsHtml = options.map(opt => `
                        <button onclick="app.handleChoiceAnswer('${opt.en}')" class="w-full text-left p-4 mb-3 bg-white border border-gray-200 rounded-lg hover:bg-indigo-50 hover:border-indigo-300 transition shadow-sm flex items-center group">
                            <span class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center mr-4 group-hover:bg-indigo-200 group-hover:text-indigo-700 font-bold text-sm">?</span>
                            <span class="text-lg">${opt.jp}</span>
                        </button>
                    `).join('');

                    container.innerHTML = `
                        <div class="max-w-2xl mx-auto fade-in">
                            <div class="mb-6 flex justify-between items-end">
                                <span class="text-sm font-semibold text-gray-500">Question ${this.state.currentIndex + 1} / 10</span>
                                <div class="w-1/2 bg-gray-200 rounded-full h-2.5">
                                    <div class="bg-blue-600 h-2.5 rounded-full" style="width: ${progress}%"></div>
                                </div>
                            </div>
                            
                            <div class="bg-white p-8 rounded-xl shadow-lg text-center mb-8 border-t-4 border-blue-500">
                                <h2 class="text-4xl font-bold text-gray-800 mb-2">${currentQ.en}</h2>
                                <p class="text-gray-400 text-sm">次の日本語の意味は？</p>
                            </div>

                            <div class="space-y-2">
                                ${optionsHtml}
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="max-w-2xl mx-auto fade-in">
                            <div class="mb-6 flex justify-between items-end">
                                <span class="text-sm font-semibold text-gray-500">Question ${this.state.currentIndex + 1} / 10</span>
                                <div class="w-1/2 bg-gray-200 rounded-full h-2.5">
                                    <div class="bg-green-600 h-2.5 rounded-full" style="width: ${progress}%"></div>
                                </div>
                            </div>

                            <div class="bg-white p-8 rounded-xl shadow-lg text-center mb-8 border-t-4 border-green-500">
                                <h2 class="text-2xl font-bold text-gray-800 mb-2">${currentQ.jp}</h2>
                                <p class="text-gray-400 text-sm">対応する英単語を入力してください</p>
                            </div>

                            <div class="bg-white p-6 rounded-xl shadow-md">
                                <input type="text" id="input-answer" 
                                    class="w-full text-center text-2xl p-4 border-b-2 border-gray-300 focus:border-green-500 focus:outline-none bg-transparent mb-6" 
                                    placeholder="Type here..." autocomplete="off"
                                    onkeydown="if(event.key === 'Enter') app.handleInputAnswer()">
                                
                                <button onclick="app.handleInputAnswer()" class="w-full bg-green-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-green-700 transition shadow-md">
                                    回答する
                                </button>
                            </div>
                        </div>
                    `;
                    setTimeout(() => document.getElementById('input-answer').focus(), 100);
                }
            },

            handleChoiceAnswer: function(selectedEn) {
                if (this.state.pendingNext) return;
                this.state.pendingNext = true;

                const currentQ = this.state.currentSet[this.state.currentIndex];
                const isCorrect = selectedEn === currentQ.en;
                
                if (isCorrect) this.state.score++;

                this.state.userAnswers.push({
                    question: currentQ,
                    userAnswer: selectedEn,
                    correctAnswer: currentQ.en,
                    isCorrect: isCorrect
                });

                this.showFeedback(isCorrect, currentQ);
            },

            handleInputAnswer: function() {
                if (this.state.pendingNext) return;
                
                const inputEl = document.getElementById('input-answer');
                if (!inputEl || inputEl.value.trim() === "") return; // Prevent empty submission

                this.state.pendingNext = true;

                const userVal = inputEl.value.trim().toLowerCase();
                const currentQ = this.state.currentSet[this.state.currentIndex];
                
                const isCorrect = userVal === currentQ.en.toLowerCase();

                if (isCorrect) this.state.score++;

                this.state.userAnswers.push({
                    question: currentQ,
                    userAnswer: userVal || "(空白)",
                    correctAnswer: currentQ.en,
                    isCorrect: isCorrect
                });

                this.showFeedback(isCorrect, currentQ);
            },

            showFeedback: function(isCorrect, questionObj) {
                const modal = document.getElementById('feedback-modal');
                const iconContainer = document.getElementById('feedback-icon');
                const title = document.getElementById('feedback-title');
                const message = document.getElementById('feedback-message');

                modal.classList.remove('hidden');

                if (isCorrect) {
                    iconContainer.innerHTML = `
                        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-green-600">
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    `;
                    title.textContent = "正解！";
                    title.className = "text-2xl font-bold mb-2 text-green-600";
                    message.innerHTML = `
                        <p class="text-lg font-bold">${questionObj.en}</p>
                        <p class="text-gray-500">${questionObj.jp}</p>
                    `;
                } else {
                    iconContainer.innerHTML = `
                        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-red-600">
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </div>
                    `;
                    title.textContent = "残念...";
                    title.className = "text-2xl font-bold mb-2 text-red-600";
                    message.innerHTML = `
                        <p class="text-gray-600 mb-2">正解は：</p>
                        <p class="text-xl font-bold text-indigo-700">${questionObj.en}</p>
                        <p class="text-gray-500 mt-1">${questionObj.jp}</p>
                    `;
                }
            },

            closeFeedback: function() {
                const modal = document.getElementById('feedback-modal');
                modal.classList.add('hidden');
                this.state.pendingNext = false;

                if (this.state.currentIndex < 9) {
                    this.state.currentIndex++;
                    this.renderQuestion();
                } else {
                    this.showResult();
                }
            },

            showResult: function() {
                this.state.currentScreen = 'result';
                const container = document.getElementById('app-container');
                const score = this.state.score;
                const percentage = (score / 10) * 100;
                
                let message = "";
                let colorClass = "";
                if (percentage === 100) { message = "Perfect! 素晴らしい！"; colorClass = "text-green-600"; }
                else if (percentage >= 80) { message = "Great Job! よくできました！"; colorClass = "text-blue-600"; }
                else if (percentage >= 60) { message = "Good! もう少し！"; colorClass = "text-yellow-600"; }
                else { message = "Keep Trying! 諦めないで！"; colorClass = "text-red-600"; }

                const resultsHtml = this.state.userAnswers.map((item, idx) => `
                    <div class="flex items-center justify-between p-4 bg-white rounded-lg shadow-sm mb-3 border-l-4 ${item.isCorrect ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex items-center gap-4">
                            <span class="font-bold text-gray-400 w-6">${idx + 1}</span>
                            <div>
                                <div class="font-bold text-gray-800">${item.question.en}</div>
                                <div class="text-sm text-gray-500">${item.question.jp}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            ${item.isCorrect 
                                ? '<span class="text-green-600 font-bold flex items-center justify-end"><svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 正解</span>' 
                                : `<div class="text-red-500 text-sm line-through">Your: ${item.userAnswer}</div><div class="text-green-600 font-bold text-sm">Ans: ${item.correctAnswer}</div>`
                            }
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="max-w-3xl mx-auto fade-in">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-bold mb-2">結果発表</h2>
                            <div class="text-6xl font-black ${colorClass} mb-2">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
                            <p class="text-xl font-medium ${colorClass}">${message}</p>
                        </div>

                        <div class="bg-gray-50 p-6 rounded-xl mb-8">
                            <h3 class="font-bold text-gray-700 mb-4 border-b pb-2">セット内の単語一覧と正誤</h3>
                            ${resultsHtml}
                        </div>

                        <div class="flex justify-center gap-4">
                            <button onclick="app.showHome()" class="bg-gray-500 text-white px-6 py-3 rounded-lg hover:bg-gray-600 transition shadow">
                                ホームに戻る
                            </button>
                            <button onclick="app.startQuiz('${this.state.quizType}')" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition shadow flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                もう一度挑戦
                            </button>
                        </div>
                    </div>
                `;
            },

            showList: function() {
                this.state.currentScreen = 'list';
                const container = document.getElementById('app-container');
                
                const listHtml = vocabularyData.map((item, idx) => `
                    <div class="flex items-center p-4 bg-white border-b border-gray-100 hover:bg-gray-50 transition">
                        <span class="text-gray-400 font-mono text-sm w-8">${idx + 1}</span>
                        <div class="flex-grow">
                            <div class="font-bold text-indigo-700 text-lg">${item.en}</div>
                            <div class="text-gray-600">${item.jp}</div>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="max-w-4xl mx-auto fade-in h-[80vh] flex flex-col">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-2xl font-bold text-gray-800">単語一覧 (Total: ${vocabularyData.length})</h2>
                            <div class="text-sm text-gray-500">順番に確認できます</div>
                        </div>
                        
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden flex-grow flex flex-col">
                            <div class="overflow-y-auto custom-scrollbar flex-grow">
                                ${listHtml}
                            </div>
                        </div>
                    </div>
                `;
            }
        };

        app.init();
    </script>
</body>
</html>
