<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英単語マスター</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
    
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-option {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-option:active {
      transform: scale(0.98);
    }

    .correct-pulse {
      animation: correct-shake 0.4s ease-in-out;
      background-color: #dcfce7 !important;
      border-color: #22c55e !important;
      color: #166534 !important;
    }

    .incorrect-shake {
      animation: incorrect-shake 0.4s ease-in-out;
      background-color: #fee2e2 !important;
      border-color: #ef4444 !important;
      color: #991b1b !important;
    }

    @keyframes incorrect-shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @keyframes correct-shake {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .hidden { display: none; }
  </style>
</head>
<body class="min-h-screen pb-12">

<header class="bg-indigo-600 text-white shadow-lg sticky top-0 z-50">
  <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
    <h1 class="text-xl font-bold tracking-tight">英単語マスター</h1>
    <div id="header-progress" class="text-sm font-medium opacity-80 hidden">問題 1 / 10</div>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 mt-8">
  <!-- Top Page -->
  <section id="page-home" class="space-y-6">
    <div class="text-center py-8">
      <h2 class="text-3xl font-extrabold text-slate-900 mb-2">学習を始めましょう</h2>
      <p class="text-slate-500">自分に合ったモードを選択してください</p>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <button onclick="startMode('mcq')" class="flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-indigo-400 hover:shadow-md transition-all group">
        <div class="w-14 h-14 bg-indigo-50 rounded-full flex items-center justify-center mb-4 group-hover:bg-indigo-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
          </svg>
        </div>
        <span class="text-lg font-bold">4択問題</span>
        <span class="text-sm text-slate-400 mt-1">意味を選択肢から選ぶ</span>
      </button>

      <button onclick="startMode('writing')" class="flex flex-col items-center justify-center p-8 bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-indigo-400 hover:shadow-md transition-all group">
        <div class="w-14 h-14 bg-indigo-50 rounded-full flex items-center justify-center mb-4 group-hover:bg-indigo-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </div>
        <span class="text-lg font-bold">記述問題</span>
        <span class="text-sm text-slate-400 mt-1">スペルを正しく入力する</span>
      </button>
    </div>

    <button onclick="showWordList()" class="w-full p-4 bg-slate-800 text-white rounded-xl font-bold shadow-lg hover:bg-slate-700 transition-colors flex items-center justify-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
      </svg>
      全ての単語を確認する
    </button>
  </section>

  <!-- MCQ Page -->
  <section id="page-mcq" class="hidden">
    <div class="bg-white rounded-3xl p-6 shadow-xl border border-slate-100">
      <div id="mcq-question" class="text-2xl font-bold text-center mb-8 py-4 border-b border-slate-50 italic text-indigo-600"></div>
      <div id="mcq-options" class="grid grid-cols-1 gap-3"></div>
      <div id="mcq-status" class="mt-6 text-center font-bold text-lg min-h-[1.5em]"></div>
      
      <div class="flex flex-col sm:flex-row gap-3 mt-8">
        <button id="mcq-next-btn" onclick="nextQuestion('mcq')" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 disabled:opacity-50 transition-all">次の問題へ</button>
        <button onclick="finishSetEarly()" class="bg-slate-100 text-slate-600 px-6 py-4 rounded-xl font-bold hover:bg-slate-200 transition-all text-sm">終了する</button>
      </div>
    </div>
  </section>

  <!-- Writing Page -->
  <section id="page-writing" class="hidden">
    <div class="bg-white rounded-3xl p-6 shadow-xl border border-slate-100">
      <div id="writing-question" class="text-2xl font-bold text-center mb-6 py-4 border-b border-slate-50 text-indigo-600"></div>
      
      <div class="relative group">
        <input id="writing-input" class="w-full p-5 text-xl text-center border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:outline-none transition-all placeholder:text-slate-300" type="text" placeholder="英単語を入力" autocomplete="off" spellcheck="false">
      </div>

      <div id="writing-status" class="mt-4 text-center font-bold text-lg min-h-[1.5em]"></div>

      <div class="flex flex-col gap-3 mt-8">
        <button id="writing-check-btn" onclick="checkWritingAnswer()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition-all">答え合わせ</button>
        <div class="flex gap-3">
          <button id="writing-next-btn" onclick="nextQuestion('writing')" class="flex-1 bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-700 disabled:opacity-50 transition-all">次へ進む</button>
          <button onclick="finishSetEarly()" class="bg-slate-100 text-slate-600 px-6 py-4 rounded-xl font-bold hover:bg-slate-200 transition-all text-sm">終了する</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Summary Page -->
  <section id="page-summary" class="hidden space-y-6">
    <div class="bg-white rounded-3xl p-8 shadow-xl text-center">
      <h2 class="text-2xl font-bold mb-2">リザルト</h2>
      <div id="summary-info" class="text-slate-600 space-y-1"></div>
      
      <div id="summary-table-container" class="mt-8 overflow-hidden rounded-2xl border border-slate-100">
        <table class="w-full text-left border-collapse">
          <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
            <tr>
              <th class="px-4 py-3">単語</th>
              <th class="px-4 py-3">答え</th>
              <th class="px-4 py-3 text-center">正誤</th>
            </tr>
          </thead>
          <tbody id="summary-body" class="text-sm divide-y divide-slate-50"></tbody>
        </table>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-8">
        <button onclick="restartSameMode()" class="bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 shadow-md transition-all">もう一度挑戦</button>
        <button onclick="backToHome()" class="bg-slate-100 text-slate-700 py-4 rounded-xl font-bold hover:bg-slate-200 transition-all">トップに戻る</button>
      </div>
    </div>
  </section>

  <!-- Word List Page -->
  <section id="page-wordlist" class="hidden">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold">単語一覧</h2>
      <button onclick="backToHome()" class="text-indigo-600 font-bold hover:underline">戻る</button>
    </div>
    
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <table class="w-full text-left border-collapse">
        <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
          <tr>
            <th class="px-4 py-3 w-12 text-center">#</th>
            <th class="px-4 py-3">英単語</th>
            <th class="px-4 py-3">意味</th>
          </tr>
        </thead>
        <tbody id="wordlist-body" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
    
    <div class="mt-8">
      <button onclick="backToHome()" class="w-full p-4 bg-slate-800 text-white rounded-xl font-bold shadow-lg hover:bg-slate-700 transition-all">トップページへ戻る</button>
    </div>
  </section>
</main>

<script>
  const words = [
    { en: "persuade", ja: "（Aを）説得して〜させる" },
    { en: "convince", ja: "（AにBを）納得させる" },
    { en: "inspire", ja: "〜を奮起させる" },
    { en: "discourage", ja: "（人）のやる気をくじく、落胆させる" },
    { en: "promote", ja: "〜を促進する" },
    { en: "boost", ja: "〜を促進させる、増大させる" },
    { en: "expand", ja: "〜を拡大する、発展させる" },
    { en: "extend", ja: "〜を延長する、広げる" },
    { en: "broaden", ja: "〜を広げる" },
    { en: "spread", ja: "〜を広げる" },
    { en: "tie", ja: "（物物など）を結ぶ" },
    { en: "fasten", ja: "〜を固定する" },
    { en: "fix", ja: "〜を修理する" },
    { en: "install", ja: "〜を設置する" },
    { en: "resist", ja: "〜を我慢する" },
    { en: "obey", ja: "〜に従う" },
    { en: "engage", ja: "（活動）に従事する" },
    { en: "bump", ja: "（〜に）ぶつかる" },
    { en: "bend", ja: "身をかがめる" },
    { en: "hug", ja: "（人）を抱きしめる" },
    { en: "stare", ja: "じっと見つめる" },
    { en: "gaze", ja: "じっと見つめる" },
    { en: "glance", ja: "ちらりと見る" },
    { en: "glimpse", ja: "ちらりと見える" },
    { en: "stretch", ja: "（手足や体を）伸ばす" },
    { en: "stumble", ja: "つまずく" },
    { en: "press", ja: "〜を（ぐいぐい）押す" },
    { en: "drag", ja: "〜を（ずるずると）引きずる" },
    { en: "lean", ja: "（〜に）寄りかかる" },
    { en: "scratch", ja: "〜をひっかく" },
    { en: "bow", ja: "おじぎをする" },
    { en: "nod", ja: "うなずく" },
    { en: "sigh", ja: "ため息をつく" },
    { en: "yawn", ja: "あくびをする" },
    { en: "sneeze", ja: "くしゃみをする" },
    { en: "bury", ja: "〜を埋める" },
    { en: "perform", ja: "〜を遂行する" },
    { en: "adopt", ja: "〜を採用する" },
    { en: "escape", ja: "（from〜）〜から逃れる" },
    { en: "scatter", ja: "〜をまき散らす" },
    { en: "fold", ja: "〜を折る" },
    { en: "hang", ja: "〜を掛ける" },
    { en: "release", ja: "〜を放す" },
    { en: "strike", ja: "〜を打つ" },
    { en: "beat", ja: "〜を打つ" },
    { en: "protect", ja: "〜を守る" },
    { en: "twist", ja: "〜をねじ曲げる" },
    { en: "skip", ja: "〜をサボる、抜かす" },
    { en: "expose", ja: "〜をさらす" },
    { en: "stir", ja: "（液体など）を混ぜる" },
    { en: "shake", ja: "振る、揺れる" },
    { en: "polish", ja: "〜を磨く" },
    { en: "attend", ja: "〜に出席する" },
    { en: "imitate", ja: "〜をまねる" },
    { en: "conduct", ja: "〜を行う" },
    { en: "struggle", ja: "苦闘する" },
    { en: "burn", ja: "（火が燃える）燃える" },
    { en: "cheat", ja: "ごまかす" },
    { en: "participate", ja: "（in〜）〜に参加する" },
    { en: "exist", ja: "（物・人などが）存在する" },
    { en: "arise", ja: "arise from〜（〜から）生じる" },
    { en: "occur", ja: "（問題、事件、考えなどが）起こる" },
    { en: "involve", ja: "（be -d in〜）事件などに巻き込まれる" },
    { en: "require", ja: "〜を必要とする" },
    { en: "counterpart", ja: "（〜の）対応するもの" },
    { en: "advent", ja: "（the A〜）〜の到来、出現" },
    { en: "maintain", ja: "〜を維持する" },
    { en: "last", ja: "（時間的に）続く" },
    { en: "persist", ja: "持続する" },
    { en: "examine", ja: "〜を調査する" },
    { en: "gain", ja: "〜を増す" },
    { en: "obtain", ja: "〜を得る" },
    { en: "acquire", ja: "〜を習得する" },
    { en: "search", ja: "A for B：B（物）を求めてA（場所）を捜す" },
    { en: "logical", ja: "論理的な" },
    { en: "scholarship", ja: "奨学金" },
    { en: "instruction", ja: "（通例〜s）指示" },
    { en: "determine", ja: "〜を決定する" },
    { en: "conclude", ja: "（that SV）〜と結論を下す" },
    { en: "distinguish", ja: "〜を区別する" },
    { en: "classify", ja: "〜を分類する" },
    { en: "estimate", ja: "〜を推定する、見積もる" },
    { en: "organize", ja: "（考えなど）をまとめる" },
    { en: "recognize", ja: "（知り合いなど）が誰だかわかる" },
    { en: "suppose", ja: "（be〜d to do）〜することになっている" },
    { en: "assume", ja: "〜と思い込む" },
    { en: "care", ja: "（否定文で）気にする" },
    { en: "approve", ja: "（of〜）〜を認める" },
    { en: "notice", ja: "〜に気がついている" },
    { en: "aware", ja: "気づいている" },
    { en: "conscious", ja: "意識している" },
    { en: "concerned", ja: "（with/about）〜に関心を持っている、懸念している" },
    { en: "regard", ja: "（A as B）AをBとみなす" },
    { en: "commit", ja: "（oneself to〜）に専念する" },
    { en: "doubt", ja: "〜を疑う" },
    { en: "memorize", ja: "〜を暗記する" },
    { en: "forgive", ja: "（人）を許す" },
    { en: "grant", ja: "～を与える、許可する" },
    { en: "recall", ja: "～を思い出す" },
    { en: "outlook", ja: "（人の人生、世界などに対する）考え方" }
  ];

  const SET_SIZE = 10;
  let currentMode = null;
  let currentSet = [];
  let currentIndex = 0;
  let results = [];
  let answeredCurrent = false;

  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function hideAllPages() {
    document.querySelectorAll('section').forEach(p => p.classList.add('hidden'));
    document.getElementById('header-progress').classList.add('hidden');
  }

  function backToHome() {
    hideAllPages();
    document.getElementById('page-home').classList.remove('hidden');
  }

  function startMode(mode) {
    currentMode = mode;
    currentSet = shuffle(words).slice(0, SET_SIZE);
    currentIndex = 0;
    results = [];
    
    hideAllPages();
    document.getElementById('header-progress').classList.remove('hidden');
    
    if (mode === 'mcq') {
      document.getElementById('page-mcq').classList.remove('hidden');
      renderMcqQuestion();
    } else {
      document.getElementById('page-writing').classList.remove('hidden');
      renderWritingQuestion();
    }
  }

  function updateProgress() {
    const prog = document.getElementById('header-progress');
    prog.textContent = `問題 ${currentIndex + 1} / ${SET_SIZE}`;
  }

  function renderMcqQuestion() {
    if (currentIndex >= currentSet.length) return showSummary();
    updateProgress();
    answeredCurrent = false;

    const q = currentSet[currentIndex];
    const qDiv = document.getElementById('mcq-question');
    const optDiv = document.getElementById('mcq-options');
    const status = document.getElementById('mcq-status');
    const nextBtn = document.getElementById('mcq-next-btn');

    qDiv.textContent = q.en;
    status.textContent = '';
    nextBtn.disabled = true;

    const options = [q, ...shuffle(words.filter(w => w.en !== q.en)).slice(0, 3)];
    const shuffledOptions = shuffle(options);

    optDiv.innerHTML = '';
    shuffledOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn-option w-full p-4 text-left border-2 border-slate-100 rounded-xl font-medium bg-slate-50 hover:border-indigo-300';
      btn.textContent = opt.ja;
      btn.onclick = () => checkMcqAnswer(opt, q, btn, optDiv);
      optDiv.appendChild(btn);
    });
  }

  function checkMcqAnswer(selected, correctWord, btn, optDiv) {
    if (answeredCurrent) return;
    answeredCurrent = true;
    
    const status = document.getElementById('mcq-status');
    const nextBtn = document.getElementById('mcq-next-btn');
    const isCorrect = selected.en === correctWord.en;

    const buttons = optDiv.querySelectorAll('button');
    buttons.forEach(b => {
      b.classList.remove('hover:border-indigo-300');
      if (b.textContent === correctWord.ja) {
        b.classList.add('correct-pulse');
      } else if (b === btn && !isCorrect) {
        b.classList.add('incorrect-shake');
      }
    });

    status.textContent = isCorrect ? '✨ 正解！' : `❌ 不正解...`;
    status.className = `mt-6 text-center font-bold text-lg ${isCorrect ? 'text-green-600' : 'text-red-600'}`;
    
    results.push({
      word: correctWord,
      correct: isCorrect,
      userAnswer: selected.ja,
      correctAnswer: correctWord.ja
    });

    nextBtn.disabled = false;
  }

  function renderWritingQuestion() {
    if (currentIndex >= currentSet.length) return showSummary();
    updateProgress();
    answeredCurrent = false;

    const q = currentSet[currentIndex];
    document.getElementById('writing-question').textContent = q.ja;
    document.getElementById('writing-input').value = '';
    document.getElementById('writing-input').disabled = false;
    document.getElementById('writing-status').textContent = '';
    document.getElementById('writing-check-btn').classList.remove('hidden');
    document.getElementById('writing-next-btn').disabled = true;
    
    setTimeout(() => document.getElementById('writing-input').focus(), 100);
  }

  function checkWritingAnswer() {
    if (answeredCurrent) return;
    const input = document.getElementById('writing-input');
    const userVal = input.value.trim().toLowerCase();
    const q = currentSet[currentIndex];
    
    if (!userVal) return;

    answeredCurrent = true;
    const isCorrect = userVal === q.en.toLowerCase();
    const status = document.getElementById('writing-status');
    const nextBtn = document.getElementById('writing-next-btn');

    input.disabled = true;
    document.getElementById('writing-check-btn').classList.add('hidden');
    
    if (isCorrect) {
      input.classList.add('correct-pulse');
      status.textContent = '✨ 正解です！';
      status.className = 'mt-4 text-center font-bold text-lg text-green-600';
    } else {
      input.classList.add('incorrect-shake');
      status.textContent = `❌ 不正解... 正答: ${q.en}`;
      status.className = 'mt-4 text-center font-bold text-lg text-red-600';
    }

    results.push({
      word: q,
      correct: isCorrect,
      userAnswer: userVal || "(空欄)",
      correctAnswer: q.en
    });

    nextBtn.disabled = false;
  }

  function nextQuestion(mode) {
    currentIndex++;
    if (mode === 'mcq') renderMcqQuestion();
    else renderWritingQuestion();
  }

  function finishSetEarly() {
    showSummary();
  }

  function showSummary() {
    hideAllPages();
    document.getElementById('page-summary').classList.remove('hidden');
    
    const info = document.getElementById('summary-info');
    const total = results.length;
    const correctCount = results.filter(r => r.correct).length;
    const score = total > 0 ? Math.round((correctCount/total)*100) : 0;

    info.innerHTML = `
      <div class="text-4xl font-black text-indigo-600 mb-2">${score}<span class="text-xl">点</span></div>
      <p class="text-sm">正解数: ${correctCount} / ${total}</p>
    `;

    const body = document.getElementById('summary-body');
    body.innerHTML = results.map(r => `
      <tr class="${r.correct ? 'bg-green-50/30' : 'bg-red-50/30'}">
        <td class="px-4 py-4 font-bold text-slate-800">
          ${r.word.en}<br>
          <span class="text-xs font-normal text-slate-400 italic">${r.word.ja}</span>
        </td>
        <td class="px-4 py-4 text-xs font-mono text-slate-500">${r.userAnswer}</td>
        <td class="px-4 py-4 text-center">
          ${r.correct ? 
            '<span class="text-green-500 font-bold">◯</span>' : 
            '<span class="text-red-500 font-bold">×</span>'}
        </td>
      </tr>
    `).join('');
  }

  function restartSameMode() {
    startMode(currentMode);
  }

  function showWordList() {
    hideAllPages();
    document.getElementById('page-wordlist').classList.remove('hidden');
    const body = document.getElementById('wordlist-body');
    body.innerHTML = words.map((w, i) => `
      <tr class="hover:bg-slate-50 transition-colors">
        <td class="px-4 py-3 text-center text-xs text-slate-400 font-mono">${i + 1}</td>
        <td class="px-4 py-3 font-bold text-indigo-600">${w.en}</td>
        <td class="px-4 py-3 text-sm text-slate-600">${w.ja}</td>
      </tr>
    `).join('');
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const writingVisible = !document.getElementById('page-writing').classList.contains('hidden');
      if (writingVisible) {
        if (!answeredCurrent) checkWritingAnswer();
        else if (!document.getElementById('writing-next-btn').disabled) nextQuestion('writing');
      }
    }
  });

  backToHome();
</script>
</body>
</html>
