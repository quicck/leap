<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語学習アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Main Container -->
    <main id="app" class="w-full max-w-2xl bg-white shadow-xl rounded-2xl overflow-hidden mt-8 mb-8">
        <!-- Header -->
        <header class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-tight">Vocabulary Master</h1>
            <p class="text-blue-100 text-sm mt-1">英単語テスト 100選</p>
        </header>

        <!-- Dynamic Content Section -->
        <section id="content" class="p-6">
            <!-- Initial content will be injected by JS -->
        </section>
    </main>

    <script>
        const wordList = [
            { word: "flavor", mean: "風味，味" },
            { word: "perfume", mean: "香り" },
            { word: "ingredient", mean: "材料" },
            { word: "bitter", mean: "苦い，つらい" },
            { word: "aisle", mean: "通路" },
            { word: "track", mean: "足跡，小道" },
            { word: "district", mean: "地区" },
            { word: "facility", mean: "施設，設備" },
            { word: "height", mean: "高さ" },
            { word: "distant", mean: "遠い" },
            { word: "locate", mean: "～に位置している" },
            { word: "occupy", mean: "～を占める" },
            { word: "surround", mean: "～を取り囲む，包囲する" },
            { word: "classical", mean: "クラシックの" },
            { word: "civilization", mean: "文明" },
            { word: "heritage", mean: "遺産" },
            { word: "script", mean: "台本，脚本" },
            { word: "tale", mean: "話" },
            { word: "literature", mean: "文学" },
            { word: "tragedy", mean: "悲劇" },
            { word: "poetry", mean: "詩" },
            { word: "biography", mean: "伝記" },
            { word: "term", mean: "用語，言葉" },
            { word: "proverb", mean: "諺" },
            { word: "dialect", mean: "方言" },
            { word: "fluent", mean: "流暢な" },
            { word: "translate", mean: "～を翻訳する" },
            { word: "define", mean: "～を定義する" },
            { word: "interpret", mean: "～を解釈する" },
            { word: "quote", mean: "～を引用する" },
            { word: "literally", mean: "文字どおりに" },
            { word: "indicate", mean: "～を示す" },
            { word: "reveal", mean: "～を明らかにする，暴露する" },
            { word: "announce", mean: "～を発表する" },
            { word: "broadcast", mean: "～を放送する" },
            { word: "prove", mean: "～を証明する" },
            { word: "advertise", mean: "～を宣伝する" },
            { word: "clarify", mean: "～を明らかにする" },
            { word: "seek", mean: "～を求める" },
            { word: "entertain", mean: "～を楽しませる" },
            { word: "amuse", mean: "～を楽しませる" },
            { word: "attract", mean: "～を引きつける，魅了する" },
            { word: "fascinate", mean: "～を魅了する" },
            { word: "absorb", mean: "～に没頭する" },
            { word: "fond", mean: "好きだ" },
            { word: "scare", mean: "～を怯えさせる" },
            { word: "alarm", mean: "～をぎょっとさせる" },
            { word: "amaze", mean: "～を驚かせる" },
            { word: "irritate", mean: "～をいらいらさせる" },
            { word: "upset", mean: "～を動揺させる" },
            { word: "puzzle", mean: "～を当惑させる" },
            { word: "confuse", mean: "～を混乱させる，困惑させる" },
            { word: "bore", mean: "～をうんざりさせる，退屈させる" },
            { word: "frustrate", mean: "～を欲求不満にさせる" },
            { word: "disappoint", mean: "～を失望させる" },
            { word: "embarrass", mean: "～に恥ずかしい思いをさせる，困惑させる" },
            { word: "ashamed", mean: "恥ずかしい" },
            { word: "uneasy", mean: "不安な，胸騒ぎがする" },
            { word: "hesitate", mean: "ためらう" },
            { word: "reluctant", mean: "気が進まない" },
            { word: "tremble", mean: "震える" },
            { word: "boast", mean: "自慢する" },
            { word: "jealous", mean: "嫉妬した" },
            { word: "envy", mean: "～を羨ましく思う" },
            { word: "yell", mean: "叫ぶ，大声をあげる" },
            { word: "respect", mean: "～を尊敬する" },
            { word: "despair", mean: "絶望" },
            { word: "emotion", mean: "感情" },
            { word: "sympathy", mean: "同情" },
            { word: "shame", mean: "残念なこと" },
            { word: "confidence", mean: "自信" },
            { word: "courage", mean: "勇気" },
            { word: "passion", mean: "情熱" },
            { word: "sorrow", mean: "悲しみ" },
            { word: "ignore", mean: "～を無視する" },
            { word: "offend", mean: "～を怒らせる" },
            { word: "depress", mean: "～を憂うつにさせる" },
            { word: "owe", mean: "～はおかげだ" },
            { word: "fear", mean: "恐怖" },
            { word: "method", mean: "方法" },
            { word: "medium", mean: "手段，媒体，メディア" },
            { word: "means", mean: "手段" },
            { word: "extent", mean: "程度" },
            { word: "extremely", mean: "極度に，非常に" },
            { word: "total", mean: "全体の" },
            { word: "largely", mean: "大部分は" },
            { word: "moderate", mean: "適度な，節度のある" },
            { word: "somewhat", 一般に: "いくぶん" },
            { word: "subtle", mean: "かすかな" },
            { word: "possibly", mean: "ひょっとすると" },
            { word: "eventually", mean: "最終的に，ついに" },
            { word: "necessarily", mean: "必ずしも" },
            { word: "frankly", mean: "率直に" },
            { word: "ironically", mean: "皮肉なことに" },
            { word: "moreover", mean: "その上" },
            { word: "otherwise", mean: "さもなければ" },
            { word: "regardless", mean: "無関係に" },
            { word: "worth", mean: "～の価値がある" },
            { word: "according to", mean: "によれば" },
            { word: "despite", mean: "～にもかかわらず" }
        ];

        // 修正: 誤字データの修正 (somewhatのキー)
        wordList.find(w => w.word === "somewhat").mean = "いくぶん";

        const content = document.getElementById('content');
        let currentTest = [];
        let currentIdx = 0;
        let score = 0;
        let results = [];

        // UI Helpers
        function showHome() {
            content.innerHTML = `
                <div class="fade-in space-y-4 py-4">
                    <button onclick="startTest('quiz')" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-xl transition duration-200">
                        4択問題を開始 (10問)
                    </button>
                    <button onclick="startTest('write')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition duration-200">
                        記述問題を開始 (10問)
                    </button>
                    <button onclick="showList()" class="w-full border-2 border-gray-200 hover:border-gray-400 text-gray-700 font-bold py-4 rounded-xl transition duration-200">
                        単語一覧を確認
                    </button>
                </div>
            `;
        }

        function showList() {
            let listHtml = `
                <div class="fade-in">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">単語一覧</h2>
                        <button onclick="showHome()" class="text-blue-600 text-sm font-semibold">戻る</button>
                    </div>
                    <div class="divide-y max-h-96 overflow-y-auto pr-2">
            `;
            wordList.forEach((item, index) => {
                listHtml += `
                    <div class="py-3 flex justify-between items-center">
                        <span class="font-bold text-gray-800">${index + 1}. ${item.word}</span>
                        <span class="text-gray-600 text-sm">${item.mean}</span>
                    </div>
                `;
            });
            listHtml += `</div></div>`;
            content.innerHTML = listHtml;
        }

        function startTest(type) {
            // Shuffle and pick 10
            const shuffled = [...wordList].sort(() => 0.5 - Math.random());
            currentTest = shuffled.slice(0, 10);
            currentIdx = 0;
            score = 0;
            results = [];
            showQuestion(type);
        }

        function showQuestion(type) {
            const current = currentTest[currentIdx];
            let qHtml = `
                <div class="fade-in">
                    <div class="flex justify-between text-xs text-gray-400 mb-2">
                        <span>第 ${currentIdx + 1} 問 / 10</span>
                        <span>Score: ${score}</span>
                    </div>
            `;

            if (type === 'quiz') {
                // Generate 4 choices
                let choices = [current.mean];
                while(choices.length < 4) {
                    const r = wordList[Math.floor(Math.random() * wordList.length)].mean;
                    if(!choices.includes(r)) choices.push(r);
                }
                choices.sort(() => 0.5 - Math.random());

                qHtml += `
                    <h2 class="text-3xl font-black text-center py-8 text-blue-700">${current.word}</h2>
                    <div class="grid grid-cols-1 gap-3">
                `;
                choices.forEach(c => {
                    qHtml += `
                        <button onclick="checkAnswer('${c}', '${current.mean}', 'quiz')" class="choice-btn w-full p-4 border-2 rounded-lg hover:bg-gray-50 text-left font-medium transition duration-150 border-gray-100">
                            ${c}
                        </button>
                    `;
                });
                qHtml += `</div>`;
            } else {
                qHtml += `
                    <h2 class="text-3xl font-black text-center py-8 text-emerald-700">${current.mean}</h2>
                    <div class="space-y-4">
                        <input type="text" id="answer-input" placeholder="英単語を入力" class="w-full p-4 border-2 border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500 text-xl text-center" autocomplete="off">
                        <button onclick="checkWriteAnswer()" class="w-full bg-gray-800 text-white font-bold py-4 rounded-xl hover:bg-black transition">回答する</button>
                    </div>
                `;
            }

            qHtml += `
                <div id="feedback" class="mt-6 text-center h-12 flex items-center justify-center font-bold text-lg"></div>
                <div id="next-action" class="hidden mt-2">
                    <button onclick="nextQuestion('${type}')" class="w-full bg-blue-500 text-white py-3 rounded-xl font-bold">次へ</button>
                </div>
                </div>
            `;
            content.innerHTML = qHtml;

            // Handle Enter key for writing
            if(type === 'write') {
                document.getElementById('answer-input').focus();
                document.getElementById('answer-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkWriteAnswer();
                });
            }
        }

        function checkWriteAnswer() {
            const input = document.getElementById('answer-input');
            if(!input || input.disabled) return;
            const answer = input.value.trim().toLowerCase();
            const correct = currentTest[currentIdx].word.toLowerCase();
            checkAnswer(answer, correct, 'write');
        }

        function checkAnswer(user, correct, type) {
            // Disable buttons/input after answering
            if(type === 'quiz') {
                const buttons = document.querySelectorAll('.choice-btn');
                buttons.forEach(b => {
                    b.disabled = true;
                    if(b.innerText.trim() === correct) {
                        b.classList.replace('border-gray-100', 'border-green-500');
                        b.classList.add('bg-green-50');
                    } else if (b.innerText.trim() === user && user !== correct) {
                        b.classList.replace('border-gray-100', 'border-red-500');
                        b.classList.add('bg-red-50');
                    }
                });
            } else {
                const input = document.getElementById('answer-input');
                input.disabled = true;
                if(user === correct) {
                    input.classList.add('bg-green-50', 'border-green-500');
                } else {
                    input.classList.add('bg-red-50', 'border-red-500');
                }
            }

            const feedback = document.getElementById('feedback');
            const isCorrect = user === correct;
            if(isCorrect) {
                score++;
                feedback.innerHTML = `<span class="text-green-600">◯ 正解！</span>`;
            } else {
                feedback.innerHTML = `<span class="text-red-600">× 不正解... 正解は [ ${correct} ]</span>`;
            }

            results.push({
                word: currentTest[currentIdx].word,
                mean: currentTest[currentIdx].mean,
                isCorrect: isCorrect
            });

            document.getElementById('next-action').classList.remove('hidden');
        }

        function nextQuestion(type) {
            currentIdx++;
            if(currentIdx < 10) {
                showQuestion(type);
            } else {
                showResult();
            }
        }

        function showResult() {
            let resHtml = `
                <div class="fade-in text-center">
                    <h2 class="text-2xl font-bold mb-2">結果発表</h2>
                    <div class="text-5xl font-black text-blue-600 mb-6">${score} / 10</div>
                    
                    <div class="bg-gray-50 rounded-xl p-4 mb-6">
                        <h3 class="font-bold text-gray-700 mb-3 border-b pb-2 text-left">今回の復習リスト</h3>
                        <div class="space-y-2 max-h-60 overflow-y-auto">
            `;

            results.forEach(res => {
                resHtml += `
                    <div class="flex items-center justify-between text-sm bg-white p-2 rounded shadow-sm">
                        <div class="text-left">
                            <span class="font-bold mr-2">${res.word}</span>
                            <span class="text-gray-500">${res.mean}</span>
                        </div>
                        <span>${res.isCorrect ? '✅' : '❌'}</span>
                    </div>
                `;
            });

            resHtml += `
                        </div>
                    </div>

                    <button onclick="showHome()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg">トップに戻る</button>
                </div>
            `;
            content.innerHTML = resHtml;
        }

        // Initialize
        window.onload = showHome;

    </script>
</body>
</html>
