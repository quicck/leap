<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEAP Word Master</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary-glow: #3b82f6;
  --secondary-glow: #60a5fa;
  --accent-red: #f43f5e;
  --accent-green: #10b981;
  --text-main: #0f172a;
  --text-sub: #475569;
  --glass-tint: rgba(255, 255, 255, 0.35);
  --glass-shimmer: rgba(255, 255, 255, 0.6);
  --glass-blur: blur(20px);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Google Sans', 'Noto Sans JP', sans-serif;
  background-color: #f8fafc;
  color: var(--text-main);
  display: flex;
  justify-content: center;
  align-items: center; /* 基本は画面中央寄せに復元 */
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  position: relative;
}

/* 流動的なリキッドグラデーション背景 */
.bg-blobs {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: -1;
  overflow: hidden;
  background: radial-gradient(circle at 50% 50%, #ffffff, #f1f5f9);
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  mix-blend-mode: multiply;
  opacity: 0.6;
  animation: moveBlob 25s infinite alternate ease-in-out;
}

.blob-1 {
  top: -10%;
  left: -10%;
  width: 60vw;
  height: 60vw;
  background: radial-gradient(circle, rgba(96, 165, 250, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
  animation-duration: 20s;
}

.blob-2 {
  bottom: -10%;
  right: -10%;
  width: 70vw;
  height: 70vw;
  background: radial-gradient(circle, rgba(147, 197, 253, 0.3) 0%, rgba(255, 255, 255, 0) 70%);
  animation-duration: 28s;
  animation-delay: -5s;
}

.blob-3 {
  top: 40%;
  left: 30%;
  width: 50vw;
  height: 50vw;
  background: radial-gradient(circle, rgba(191, 219, 254, 0.3) 0%, rgba(255, 255, 255, 0) 70%);
  animation-duration: 24s;
  animation-delay: -10s;
}

@keyframes moveBlob {
  0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
  33% { transform: translate(10%, 15%) scale(1.1) rotate(120deg); }
  66% { transform: translate(-10%, -10%) scale(0.9) rotate(240deg); }
  100% { transform: translate(0px, 0px) scale(1) rotate(360deg); }
}

.container {
  width: 100%;
  max-width: 720px;
  padding: 40px 24px;
  position: relative;
  z-index: 1;
}

/* 各画面を中央寄せにするためのラッパー */
.screen-wrapper {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 80vh; /* デバイス上で中央に綺麗に収まる高さ */
  width: 100%;
}

/* クイズ画面のみ、ガタつき防止のための特別レイアウト（上詰め気味＆高さ固定要素内包） */
#quizScreen.screen-wrapper {
  justify-content: flex-start;
  min-height: auto;
  padding-top: 20px;
}

header {
  text-align: center;
  margin-bottom: 40px;
}

h1 {
  font-size: 38px;
  font-weight: 700;
  margin: 0;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
  position: relative;
}

h1::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 25%;
  width: 50%;
  height: 4px;
  background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.4), transparent);
  border-radius: 2px;
}

.section {
  margin-bottom: 30px;
}

/* Loading */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 70vh;
}

.liquid-loader {
  position: relative;
  width: 80px;
  height: 80px;
}

.liquid-loader div {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 4px solid transparent;
  border-top-color: var(--primary-glow);
  border-radius: 50%;
  animation: liquidOrbit 1.5s cubic-bezier(0.5, 0, 0.5, 1) infinite;
}

.liquid-loader div:nth-child(1) { animation-delay: -0.45s; }
.liquid-loader div:nth-child(2) { animation-delay: -0.3s; }
.liquid-loader div:nth-child(3) { animation-delay: -0.15s; }

@keyframes liquidOrbit {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Buttons (Liquid Glass Style) */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 18px 32px;
  border-radius: 30px;
  border: 1px solid var(--glass-shimmer);
  background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.3) 100%);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  color: #1e3a8a;
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  margin-bottom: 16px;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03), inset 0 1px 1px rgba(255, 255, 255, 0.6);
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -50%;
  width: 200%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
  transform: skewX(-15deg);
  transition: 0.75s;
}

.btn:hover::before {
  left: 120%;
}

.btn:hover {
  background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 100%);
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(59, 130, 246, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.8);
  border-color: rgba(59, 130, 246, 0.3);
}

.btn:active {
  transform: translateY(-1px);
}

.btn-primary {
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.02) 100%);
  color: var(--primary-glow);
  border-color: rgba(59, 130, 246, 0.2);
}

.btn-primary:hover {
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(59, 130, 246, 0.05) 100%);
  border-color: rgba(59, 130, 246, 0.4);
}

.back-btn {
  background: var(--glass-tint);
  border: 1px solid var(--glass-shimmer);
  color: var(--text-sub);
  font-size: 18px;
  cursor: pointer;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  box-shadow: 0 4px 15px rgba(0,0,0,0.02);
}

.back-btn:hover {
  background: rgba(255,255,255,0.6);
  transform: scale(1.1) rotate(-90deg);
  border-color: var(--primary-glow);
}

.quit-btn {
  background: rgba(244, 63, 94, 0.05);
  border: 1px solid rgba(244, 63, 94, 0.15);
  color: var(--accent-red);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  transition: all 0.3s;
}

.quit-btn:hover {
  background: rgba(244, 63, 94, 0.1);
  transform: translateY(-2px);
}

/* Fluid Range Inputs */
.range-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin: 20px 0;
}

input[type="number"] {
  width: 110px;
  padding: 16px;
  border-radius: 24px;
  border: 1px solid var(--glass-shimmer);
  background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 100%);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  color: var(--text-main);
  font-family: inherit;
  font-weight: 600;
  text-align: center;
  font-size: 18px;
  outline: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.02);
  transition: all 0.3s;
}

input[type="number"]:focus {
  border-color: var(--primary-glow);
  background: rgba(255, 255, 255, 0.85);
  transform: scale(1.05);
}

.part-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

@media (min-width: 600px) {
  .part-grid {
    grid-template-columns: repeat(5, 1fr);
  }
}

.part-btn {
  padding: 14px;
  border-radius: 20px;
  border: 1px solid var(--glass-shimmer);
  background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.15) 100%);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  color: var(--text-sub);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 15px rgba(0,0,0,0.01);
}

.part-btn:hover {
  background: rgba(255, 255, 255, 0.7);
  transform: translateY(-2px);
}

.part-btn.active {
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, rgba(59, 130, 246, 0.05) 100%);
  color: var(--primary-glow);
  border-color: rgba(59, 130, 246, 0.3);
  transform: scale(1.05);
}

.error-text {
  color: var(--accent-red);
  font-size: 13px;
  text-align: center;
  margin-bottom: 12px;
  display: none;
  font-weight: 600;
}

/* Quiz Style */
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-sub);
}

.question-area {
  text-align: center;
  min-height: 140px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  margin-bottom: 24px;
  position: relative;
}

.question-text {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text-main);
  letter-spacing: -1px;
  animation: textFloat 3s ease-in-out infinite alternate;
}

@keyframes textFloat {
  0% { transform: translateY(0); }
  100% { transform: translateY(-5px); }
}

#choiceContainer {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

@media (min-width: 600px) {
  #choiceContainer {
    grid-template-columns: repeat(2, 1fr);
  }
}

.choice-btn {
  background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.3) 100%);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  color: var(--text-main);
  text-align: center;
  padding: 22px;
  font-weight: 600;
  font-size: 16px;
  border: 1px solid var(--glass-shimmer);
  border-radius: 24px;
  width: 100%;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.02);
}

.choice-btn:hover {
  background: rgba(255, 255, 255, 0.9);
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 10px 25px rgba(59, 130, 246, 0.05);
}

.choice-btn.correct {
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(16, 185, 129, 0.05) 100%) !important;
  color: var(--accent-green) !important;
  border-color: rgba(16, 185, 129, 0.4) !important;
  font-weight: 700;
  transform: scale(1.02);
}

.choice-btn.wrong {
  background: linear-gradient(135deg, rgba(244, 63, 94, 0.15) 0%, rgba(244, 63, 94, 0.05) 100%) !important;
  color: var(--accent-red) !important;
  border-color: rgba(244, 63, 94, 0.4) !important;
  font-weight: 700;
  transform: scale(0.98);
}

/* 4択の下に固定高のエリアを確保（回答・フィードバック発生時のガタつき・レイアウト変動を完全排除） */
.action-box {
  height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  margin-top: 15px;
  position: relative;
}

/* Typing UI */
.typing-input {
  width: 100%;
  padding: 20px;
  border-radius: 24px;
  border: 1px solid var(--glass-shimmer);
  font-size: 20px;
  text-align: center;
  margin-bottom: 20px;
  outline: none;
  background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.3) 100%);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  color: var(--text-main);
  box-shadow: 0 4px 25px rgba(0,0,0,0.02);
  transition: all 0.3s;
}

.typing-input:focus {
  border-color: var(--primary-glow);
  background: rgba(255, 255, 255, 0.85);
  box-shadow: 0 8px 30px rgba(59, 130, 246, 0.06);
}

#resultList {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-top: 30px;
}

@media (min-width: 600px) {
  #resultList {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Result Item */
.result-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px;
  border-radius: 24px;
  background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 100%);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-shimmer);
  box-shadow: 0 4px 20px rgba(0,0,0,0.02);
}

.status-icon {
  font-size: 22px;
  font-weight: 700;
}

/* Word Table View */
.word-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}

.word-table th {
  text-align: left;
  color: var(--text-sub);
  padding: 16px;
  font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,0.5);
}

.word-table td {
  padding: 20px 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.25);
}

#wordListScrollArea {
  max-height: 65vh;
  overflow-y: auto;
  padding: 0 8px;
}

/* Scrollbar Customization */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: rgba(59, 130, 246, 0.2);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(59, 130, 246, 0.4);
}

.hidden {
  display: none !important;
}

/* Animations */
.fade-in {
  animation: elementReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes elementReveal {
  from {
    opacity: 0;
    transform: translateY(15px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* スマートフォン画面の最適化 */
@media (max-width: 600px) {
  .container {
    padding: 16px 16px 40px 16px;
  }
  header {
    margin-bottom: 24px;
  }
  h1 {
    font-size: 30px;
  }
  h1::after {
    bottom: -4px;
    height: 3px;
  }
  .section {
    margin-bottom: 20px;
  }
  .quiz-header {
    margin-bottom: 16px;
  }
  .question-area {
    min-height: 100px;
    margin-bottom: 16px;
  }
  .question-text {
    font-size: 32px;
    margin-bottom: 4px;
  }
  #choiceContainer {
    gap: 10px;
  }
  .choice-btn {
    padding: 14px 16px;
    font-size: 14px;
    border-radius: 18px;
  }
  .typing-input {
    padding: 14px;
    font-size: 16px;
    border-radius: 18px;
    margin-bottom: 10px;
  }
  .action-box {
    height: 100px; /* モバイル時は少しコンパクトな固定高 */
    margin-top: 10px;
  }
  #feedbackArea {
    font-size: 15px;
    min-height: 1.2em;
  }
  .btn {
    padding: 14px 20px;
    font-size: 14px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  #nextBtn {
    margin-top: 6px;
  }
  .part-grid {
    gap: 6px;
    margin-bottom: 16px;
  }
  .part-btn {
    padding: 12px;
    font-size: 13px;
    border-radius: 16px;
  }
  .range-container {
    margin: 16px 0;
    gap: 10px;
  }
  input[type="number"] {
    width: 95px;
    padding: 14px;
    font-size: 16px;
    border-radius: 18px;
  }
}

/* 高さ制限の厳しい極小デバイス向け */
@media (max-height: 660px) and (max-width: 600px) {
  header {
    margin-bottom: 10px;
  }
  .quiz-header {
    margin-bottom: 8px;
  }
  .question-area {
    min-height: 75px;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 26px;
  }
  .choice-btn {
    padding: 12px 14px;
    font-size: 13px;
  }
  .action-box {
    height: 85px;
  }
  #nextBtn {
    margin-top: 4px;
  }
}
</style>
</head>
<body>

<!-- Liquid Background -->
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="container">
  <!-- Loading Screen -->
  <div id="loadingScreen" class="loading-screen">
    <div class="liquid-loader">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <p id="loadingText" style="margin-top:30px; color:var(--text-sub); font-weight:600; font-size:15px; letter-spacing:0.5px;">LEAPデータを読み込み中...</p>
  </div>

  <!-- Start Screen (中央配置) -->
  <div id="startScreen" class="hidden screen-wrapper fade-in">
    <header>
      <h1>LEAP 2300</h1>
    </header>
    <div class="section">
      <button class="btn btn-primary" onclick="startWithRange(1, 2300)">すべての単語 (1-2300)</button>
      
      <div style="margin-top: 30px;">
        <p style="text-align: center; margin-bottom: 16px; font-weight: 600; color:var(--text-sub); font-size:15px; letter-spacing:0.5px;">範囲を指定して学習</p>
        <div class="part-grid">
          <button class="part-btn" onclick="selectPart(this, 1, 400)">Part 1</button>
          <button class="part-btn" onclick="selectPart(this, 401, 1000)">Part 2</button>
          <button class="part-btn" onclick="selectPart(this, 1001, 1400)">Part 3</button>
          <button class="part-btn" onclick="selectPart(this, 1401, 2000)">Part 4</button>
          <button class="part-btn" onclick="selectPart(this, 2001, 2300)">+α</button>
        </div>
        <div class="range-container">
          <input type="number" id="rangeStart" value="" min="1" placeholder="開始">
          <span style="color:var(--text-sub); font-weight: 700; font-size: 18px;">～</span>
          <input type="number" id="rangeEnd" value="" max="2300" placeholder="終了">
        </div>
        <div id="rangeError" class="error-text">正しい範囲を入力してください</div>
        <button class="btn" style="margin-top:10px;" onclick="validateRange()">この範囲で進む</button>
      </div>
    </div>
  </div>

  <!-- Mode Select Screen (中央配置) -->
  <div id="modeScreen" class="hidden screen-wrapper fade-in">
    <div style="display:flex; align-items:center; margin-bottom: 30px;">
      <button class="back-btn" onclick="showScreen('startScreen')">✕</button>
      <h2 id="modeTitle" style="margin:0 0 0 20px; font-size:24px; font-weight:700; color:var(--text-main);">範囲: 1-100</h2>
    </div>
    <div class="section">
      <p style="text-align: center; margin-bottom: 12px; font-weight: 600; font-size: 15px; color:var(--text-sub);">問題数</p>
      <div class="range-container">
        <input type="number" id="quizCountInput" value="10" min="1">
        <span style="color:var(--text-sub); font-weight: 700; font-size: 18px;">問</span>
      </div>
      <div id="countError" class="error-text">範囲内の語数以下を指定してください</div>
      
      <div style="margin-top: 30px;">
        <button class="btn btn-primary" onclick="startQuiz('choice')">4択テストを開始</button>
        <button class="btn" onclick="startQuiz('typing')">記述テストを開始</button>
        <div style="text-align:center; margin-top:20px;">
          <button class="part-btn" style="border:none; background:none; text-decoration:underline; font-size:15px; padding:8px 16px;" onclick="showWordList()">単語一覧を確認</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Quiz Screen (上詰め ＋ ガタつき完全防止設計) -->
  <div id="quizScreen" class="hidden screen-wrapper fade-in">
    <div class="quiz-header">
      <span id="quizProgress">1 / 10</span>
      <button class="quit-btn" onclick="quitQuiz()">終了</button>
      <span id="quizScore" style="color:var(--primary-glow)">正解: 0</span>
    </div>
    <div class="question-area">
      <div id="questionText" class="question-text">word</div>
      <div id="questionHint" style="color: var(--text-sub); font-size: 15px; margin-top:6px; font-weight:600; letter-spacing:0.5px;"></div>
    </div>
    
    <div id="choiceContainer">
      <!-- Choices injected here -->
    </div>
    
    <div id="typingContainer" class="hidden">
      <input type="text" id="typingInput" class="typing-input" placeholder="英単語を入力" autocomplete="off" spellcheck="false">
      <button class="btn btn-primary" id="typingSubmitBtn" onclick="checkTypingAnswer()">回答を確定</button>
    </div>
    
    <!-- 高さ固定の専用アクションエリア（画面ガタつき防止） -->
    <div class="action-box">
      <div id="feedbackArea" style="text-align: center; font-weight: 700; font-size: 18px; min-height: 1.5em; letter-spacing:0.5px; width:100%;"></div>
      <button id="nextBtn" class="btn hidden" style="background:linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); color:white; border:none; margin: 0; width:100%;" onclick="nextQuestion()">次へ進む</button>
    </div>
  </div>

  <!-- Result Summary Screen (中央配置) -->
  <div id="resultScreen" class="hidden screen-wrapper fade-in">
    <header>
      <h1 style="background: linear-gradient(135deg, #059669 0%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">結果レポート</h1>
    </header>
    <div class="section" style="text-align:center; margin-bottom:30px;">
      <h2 style="font-size: 32px; margin:0; color: var(--primary-glow); font-weight: 700; letter-spacing: -0.5px;" id="finalScore">7 / 10 正解</h2>
    </div>
    <div id="resultList">
      <!-- Word summary here -->
    </div>
    <div style="margin-top:30px;">
      <button class="btn btn-primary" onclick="retryCurrentSet()">同じ条件でもう一度挑戦</button>
      <button class="btn" onclick="showScreen('modeScreen')">メニューに戻る</button>
    </div>
  </div>

  <!-- Word List View (中央配置) -->
  <div id="wordListScreen" class="hidden screen-wrapper fade-in">
    <div style="display:flex; align-items:center; margin-bottom: 30px;">
      <button class="back-btn" onclick="showScreen('modeScreen')">✕</button>
      <h2 style="margin:0 0 0 20px; font-size:24px; font-weight:700; color:var(--text-main);">単語リスト</h2>
    </div>
    <div class="section">
      <div id="wordListScrollArea">
        <table class="word-table">
          <thead>
            <tr>
              <th width="80">No.</th>
              <th>単語</th>
              <th>意味</th>
            </tr>
          </thead>
          <tbody id="wordTableBody">
            <!-- Words injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let allWords = [];
let currentPool = [];
let quizSet = [];
let currentIndex = 0;
let score = 0;
let sessionResults = [];
let currentQuizMode = '';
let totalQuestions = 10;

async function fetchLeapData() {
  const targetUrl = "https://ukaru-eigo.com/leap-modified-list/";
  const loadingText = document.getElementById('loadingText');
  
  try {
    const res = await fetch(`https://proxy.cors.sh/${targetUrl}`);
    if (!res.ok) throw new Error();
    const html = await res.text();
    
    if (html && html.includes('tablepress-55')) {
      parseWords(html);
    } else {
      throw new Error();
    }
  } catch (e) {
    loadingText.innerHTML = '<span style="color:var(--accent-red); font-weight:700;">データの取得に失敗しました。再読み込みしてください。</span>';
  }
}

function parseWords(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const rows = doc.querySelectorAll('#tablepress-55 tbody tr');
  allWords = Array.from(rows).map(row => {
    const cols = row.querySelectorAll('td');
    return {
      no: parseInt(cols[0].textContent),
      word: cols[1].textContent.trim(),
      meaning: cols[2].textContent.trim()
    };
  }).filter(w => !isNaN(w.no));

  if (allWords.length > 0) {
    showScreen('startScreen');
  } else {
    document.getElementById('loadingText').innerText = "パースエラー: データが見つかりません。";
  }
}

function showScreen(screenId) {
  document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
  document.getElementById(screenId).classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectPart(btn, start, end) {
  const isActive = btn.classList.contains('active');
  document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
  if (isActive) {
    document.getElementById('rangeStart').value = "";
    document.getElementById('rangeEnd').value = "";
  } else {
    btn.classList.add('active');
    document.getElementById('rangeStart').value = start;
    document.getElementById('rangeEnd').value = end;
  }
}

function validateRange() {
  const startVal = document.getElementById('rangeStart').value;
  const endVal = document.getElementById('rangeEnd').value;
  const start = parseInt(startVal);
  const end = parseInt(endVal);
  const error = document.getElementById('rangeError');
  
  if (startVal === "" || endVal === "" || isNaN(start) || isNaN(end) || start < 1 || end > allWords.length || start > end) {
    error.style.display = 'block';
  } else {
    error.style.display = 'none';
    startWithRange(start, end);
  }
}

function startWithRange(start, end) {
  currentPool = allWords.filter(w => w.no >= start && w.no <= end);
  const poolSize = currentPool.length;
  document.getElementById('modeTitle').innerText = `範囲: ${start} - ${end}`;
  const quizCountInput = document.getElementById('quizCountInput');
  quizCountInput.value = poolSize < 10 ? poolSize : 10;
  document.getElementById('countError').style.display = 'none';
  showScreen('modeScreen');
}

function showWordList() {
  const tbody = document.getElementById('wordTableBody');
  const scrollArea = document.getElementById('wordListScrollArea');
  tbody.innerHTML = '';
  currentPool.forEach(w => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="color:var(--text-sub); font-weight:600;">${w.no}</td><td style="font-weight:700">${w.word}</td><td style="font-weight:500">${w.meaning}</td>`;
    tbody.appendChild(tr);
  });
  showScreen('wordListScreen');
  if (scrollArea) scrollArea.scrollTop = 0;
}

function startQuiz(mode) {
  const countInput = document.getElementById('quizCountInput');
  const count = parseInt(countInput.value);
  const error = document.getElementById('countError');
  if (isNaN(count) || count < 1 || count > currentPool.length) {
    error.style.display = 'block';
    return;
  }
  error.style.display = 'none';
  currentQuizMode = mode;
  totalQuestions = count;
  score = 0;
  currentIndex = 0;
  sessionResults = [];
  quizSet = [...currentPool].sort(() => 0.5 - Math.random()).slice(0, totalQuestions);
  showScreen('quizScreen');
  renderQuestion();
}

function retryCurrentSet() {
  score = 0;
  currentIndex = 0;
  sessionResults = [];
  quizSet = [...currentPool].sort(() => 0.5 - Math.random()).slice(0, totalQuestions);
  showScreen('quizScreen');
  renderQuestion();
}

function quitQuiz() {
  showResults();
}

function renderQuestion() {
  const word = quizSet[currentIndex];
  document.getElementById('quizProgress').innerText = `${currentIndex + 1} / ${totalQuestions}`;
  document.getElementById('quizScore').innerText = `正解: ${score}`;
  document.getElementById('feedbackArea').innerText = '';
  document.getElementById('nextBtn').classList.add('hidden');
  
  if (currentQuizMode === 'choice') {
    document.getElementById('questionText').innerText = word.word;
    document.getElementById('questionHint').innerText = '意味を選択してください';
    document.getElementById('choiceContainer').classList.remove('hidden');
    document.getElementById('typingContainer').classList.add('hidden');
    renderChoices(word);
  } else {
    document.getElementById('questionText').innerText = word.meaning;
    document.getElementById('questionHint').innerText = '英単語を入力してください';
    document.getElementById('choiceContainer').classList.add('hidden');
    document.getElementById('typingContainer').classList.remove('hidden');
    const input = document.getElementById('typingInput');
    input.value = '';
    input.disabled = false;
    input.focus();
    document.getElementById('typingSubmitBtn').disabled = false;
  }
}

function renderChoices(correctWord) {
  const container = document.getElementById('choiceContainer');
  container.innerHTML = '';
  let distractors = allWords
    .filter(w => w.word !== correctWord.word)
    .sort(() => 0.5 - Math.random())
    .slice(0, 3);
  let choices = [...distractors, correctWord].sort(() => 0.5 - Math.random());
  
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerText = choice.meaning;
    btn.onclick = () => checkChoiceAnswer(btn, choice.word === correctWord.word);
    container.appendChild(btn);
  });
}

function checkChoiceAnswer(btn, isCorrect) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.onclick = null);
  const correctWord = quizSet[currentIndex];
  sessionResults.push({ word: correctWord.word, meaning: correctWord.meaning, correct: isCorrect });
  
  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    document.getElementById('feedbackArea').innerHTML = '<span style="color:var(--accent-green)">正解です！</span>';
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedbackArea').innerHTML = `<span style="color:var(--accent-red)">不正解 (正解: ${correctWord.meaning})</span>`;
    btns.forEach(b => {
      if (b.innerText === correctWord.meaning) b.classList.add('correct');
    });
  }
  document.getElementById('nextBtn').classList.remove('hidden');
}

function checkTypingAnswer() {
  const input = document.getElementById('typingInput');
  const userAns = input.value.trim().toLowerCase();
  const correctWord = quizSet[currentIndex];
  const isCorrect = userAns === correctWord.word.toLowerCase();
  input.disabled = true;
  document.getElementById('typingSubmitBtn').disabled = true;
  sessionResults.push({ word: correctWord.word, meaning: correctWord.meaning, correct: isCorrect });
  
  if (isCorrect) {
    score++;
    document.getElementById('feedbackArea').innerHTML = '<span style="color:var(--accent-green)">正解です！</span>';
  } else {
    document.getElementById('feedbackArea').innerHTML = `<span style="color:var(--accent-red)">不正解 (正解: ${correctWord.word})</span>`;
  }
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < totalQuestions) {
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  showScreen('resultScreen');
  const answeredCount = sessionResults.length;
  document.getElementById('finalScore').innerText = `${answeredCount}問中 ${score}問 正解`;
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  
  sessionResults.forEach(res => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <div>
        <div style="font-weight:700; font-size:17px; color:var(--text-main);">${res.word}</div>
        <div style="font-size:13px; color:var(--text-sub); font-weight:600; margin-top:4px;">${res.meaning}</div>
      </div>
      <div class="status-icon" style="color: ${res.correct ? 'var(--accent-green)' : 'var(--accent-red)'}">
        ${res.correct ? '✓' : '✕'}
      </div>
    `;
    list.appendChild(div);
  });
  
  if (answeredCount === 0) {
    list.innerHTML = '<p style="text-align:center; color:var(--text-sub); font-weight:600;">回答した問題はありません。</p>';
  }
}

document.getElementById('typingInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !document.getElementById('typingSubmitBtn').disabled) {
    checkTypingAnswer();
  } else if (e.key === 'Enter' && !document.getElementById('nextBtn').classList.contains('hidden')) {
    nextQuestion();
  }
});

window.onload = fetchLeapData;
</script>
</body>
  </html>
