<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEAP Word Master</title>
<style>
/* 共通レイアウト調整 */
body {
  font-family: sans-serif;
  line-height: 1.5;
  margin: 0;
  padding: 12px; /* スマホ向けに少し余白をスリムに */
  background-color: #fcfcfc;
  color: #333;
}
.container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  box-sizing: border-box;
}
.hidden {
  display: none !important;
}

/* グリッド・レスポンシブ配置 */
.part-grid {
  display: grid;
  /* 画面幅に応じて、ボタンが入り切らない場合は自動で折り返す設定 */
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
  width: 100%;
}
.range-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 16px 0;
  width: 100%;
}
#choiceContainer {
  display: grid;
  /* デフォルト（狭い画面・スマホ）は1列表示 */
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 16px;
  width: 100%;
}

/* 画面幅が一定以上の場合は必ず2列（2×2）に統一 */
@media (min-width: 500px) {
  #choiceContainer {
    grid-template-columns: repeat(2, 1fr);
  }
}

#resultList {
  display: grid;
  /* 結果レポート用の可変グリッド */
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
  margin-top: 16px;
  width: 100%;
}

/* フォームと入力欄の横幅を画面幅に合わせる */
button, input[type="number"], input[type="text"] {
  font-size: 16px;
  padding: 8px 12px;
  box-sizing: border-box;
  max-width: 100%;
}
button {
  cursor: pointer;
}
.btn {
  width: 100%;
  padding: 12px;
  margin-bottom: 8px;
}
.part-btn {
  padding: 8px 4px;
  font-size: 14px;
}
.part-btn.active {
  background-color: #2563eb;
  color: white;
}

/* 数値入力欄の過剰な横広がりを防止 */
input[type="number"] {
  width: 100px;
  flex-shrink: 1;
}

/* 4択解答時の色分け表示 */
.choice-btn {
  width: 100%;
}
.choice-btn.correct {
  background-color: #d1fae5 !important;
  color: #065f46 !important;
  font-weight: bold;
}
.choice-btn.wrong {
  background-color: #fee2e2 !important;
  color: #991b1b !important;
  font-weight: bold;
}

/* 単語リストテーブル（スマホでの横スクロールを可能に） */
.word-table-wrapper {
  width: 100%;
  overflow-x: auto;
}
.word-table {
  width: 100%;
  border-collapse: collapse;
}
.word-table th, .word-table td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: left;
}
#wordListScrollArea {
  max-height: 70vh;
  overflow-y: auto;
}

/* 検索エリア */
.search-container {
  margin-bottom: 16px;
  width: 100%;
}
.search-input {
  width: 100%;
  padding: 10px 12px;
  font-size: 15px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}

/* 品詞タグ（カッコ内の文字を四角で囲む）スタイル */
.part-of-speech-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: bold;
  border: 1px solid #777;
  border-radius: 3px;
  padding: 1px 4px;
  margin-right: 4px;
  margin-left: 2px;
  line-height: 1.2;
  background-color: #f0f0f0;
  color: #444;
  vertical-align: middle;
}

/* ローディング */
.loading-screen {
  text-align: center;
  padding-top: 100px;
}
.google-loader {
  width: 40px;
  height: 40px;
  border: 4px solid #ccc;
  border-top: 4px solid #2563eb;
  border-radius: 50%;
  margin: 0 auto;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ユーティリティ */
.error-text {
  color: #ef4444;
  text-align: center;
  margin-bottom: 8px;
  display: none;
  font-weight: bold;
}
.result-item {
  border: 1px solid #ccc;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background-color: #fff;
  box-sizing: border-box;
}

/* --- 語彙テスト専用追加スタイル --- */
.test-btn-primary {
  background-color: #2563eb;
  color: white;
  border: none;
  font-weight: bold;
}
.test-btn-primary:hover {
  background-color: #1d4ed8;
}
.timer-text {
  font-size: 20px;
  font-weight: bold;
  color: #dc2626;
  font-family: monospace;
}

/* --- 語彙テスト（5問並列上部表示・共通選択肢下部表示） --- */
.vocab-top-words-container {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
@media (max-width: 600px) {
  .vocab-top-words-container {
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  }
}
.vocab-word-card {
  border: 1px solid #ccc;
  background-color: #fff;
  border-radius: 6px;
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 85px;
}
.vocab-word-card.active-focus {
  background-color: #eff6ff;
  border-color: #2563eb;
  box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
}
.vocab-card-num {
  font-size: 11px;
  color: #666;
  font-weight: bold;
}
.vocab-card-word {
  font-size: 16px;
  font-weight: bold;
  color: #111;
  word-break: break-all;
  margin: 4px 0;
}
.vocab-card-ans-badge {
  font-size: 11px;
  font-weight: bold;
  padding: 2px 6px;
  background-color: #f3f4f6;
  border-radius: 100px;
  color: #374151;
  display: inline-block;
  margin-top: auto;
}
.vocab-word-card.active-focus .vocab-card-ans-badge {
  background-color: #bfdbfe;
  color: #1e3a8a;
}
.vocab-card-ans-badge.has-ans {
  background-color: #2563eb;
  color: #fff;
}
.vocab-word-card.active-focus .vocab-card-ans-badge.has-ans {
  background-color: #1d4ed8;
  color: #fff;
}

/* 下部：共通選択肢ボックス */
.vocab-shared-choices-box {
  background-color: #f3f4f6;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  padding: 12px;
}
.vocab-shared-choices-title {
  font-size: 13px;
  font-weight: bold;
  color: #4b5563;
  margin-bottom: 8px;
  border-bottom: 1px solid #d1d5db;
  padding-bottom: 4px;
  text-align: center;
}
.vocab-shared-choice-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 8px;
}
.vocab-shared-choice-item {
  font-size: 13px;
  background-color: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  cursor: pointer;
  text-align: left;
  width: 100%;
}
.vocab-shared-choice-item:hover {
  background-color: #f9fafb;
  border-color: #9ca3af;
}
.vocab-shared-choice-item.selected-for-active {
  background-color: #eff6ff;
  border-color: #2563eb;
}

.choice-num-key {
  display: inline-block;
  width: 22px;
  height: 22px;
  text-align: center;
  line-height: 20px;
  border: 1px solid #666;
  border-radius: 4px;
  background-color: #eaeaea;
  margin-right: 8px;
  font-size: 11px;
  font-weight: bold;
  flex-shrink: 0;
  color: #333;
}
.vocab-nav-bar {
  display: flex;
  justify-content: space-between;
  margin-top: 24px;
  gap: 12px;
}
.vocab-nav-btn {
  flex: 1;
  padding: 12px;
}
/* 問題進捗表示用グリッド（32ナビポイントに最適化） */
.vocab-progress-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
  margin-top: 20px;
  background-color: #f3f4f6;
  padding: 8px;
  border-radius: 8px;
}
.vocab-progress-cell {
  padding: 8px 4px;
  font-size: 11px;
  font-weight: bold;
  border: 1px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #fff;
  cursor: pointer;
  border-radius: 4px;
  user-select: none;
  text-align: center;
}
.vocab-progress-cell.current {
  outline: 2px solid #2563eb;
}
.vocab-progress-cell.answered {
  background-color: #bfdbfe;
  color: #1e3a8a;
}
/* 結果画面詳細 */
.vocab-result-details {
  margin-top: 24px;
}
.vocab-result-card {
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 16px;
  background-color: #fff;
}
.vocab-result-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
  margin-bottom: 8px;
}
.mapping-box {
  background-color: #f9fafb;
  border: 1px dashed #ccc;
  border-radius: 6px;
  padding: 12px;
  margin-top: 12px;
  font-size: 13px;
}
.mapping-list {
  padding-left: 18px;
  margin: 4px 0 0 0;
}
</style>
</head>
<body>
<div class="container">
  <!-- Loading Screen -->
  <div id="loadingScreen" class="loading-screen">
    <div class="google-loader"></div>
    <p id="loadingText" style="margin-top:20px; font-weight:bold;">LEAPデータを読み込み中...</p>
  </div>

  <!-- Start Screen -->
  <div id="startScreen" class="hidden">
    <header style="text-align: center;">
      <h1><span style="color:#2563eb">LEAP</span> 2300</h1>
    </header>
    <div class="card">
      <!-- 語彙テスト開始ボタン -->
      <button class="btn test-btn-primary" style="padding: 18px; font-size:18px; margin-bottom: 24px;" onclick="initVocabTest()">
        語彙テストを開始 (30分 / 80問)
      </button>

      <button class="btn" onclick="startWithRange(1, 2300)">すべての単語 (1-2300) で学習</button>
      <div style="margin-top: 32px;">
        <p style="text-align: center; margin-bottom: 16px; font-weight: bold;">範囲を指定して学習</p>
        <div class="part-grid">
          <button class="part-btn" onclick="selectPart(this, 1, 400)">Part 1</button>
          <button class="part-btn" onclick="selectPart(this, 401, 1000)">Part 2</button>
          <button class="part-btn" onclick="selectPart(this, 1001, 1400)">Part 3</button>
          <button class="part-btn" onclick="selectPart(this, 1401, 2000)">Part 4</button>
          <button class="part-btn" onclick="selectPart(this, 2001, 2300)">+α</button>
        </div>
        <div class="range-container">
          <input type="number" id="rangeStart" value="" min="1" placeholder="開始">
          <span>～</span>
          <input type="number" id="rangeEnd" value="" max="2300" placeholder="終了">
        </div>
        <div id="rangeError" class="error-text">正しい範囲を入力してください</div>
        <button class="btn" onclick="validateRange()">この範囲で進む</button>
      </div>
    </div>
  </div>

  <!-- Mode Select Screen -->
  <div id="modeScreen" class="hidden">
    <div style="display:flex; align-items:center; margin-bottom: 24px; gap: 16px;">
      <button onclick="showScreen('startScreen')">✕</button>
      <h2 id="modeTitle" style="margin:0; font-size: 1.25rem;">範囲: 1-100</h2>
    </div>
    <div class="card">
      <p style="text-align: center; margin-bottom: 8px; font-weight: bold;">問題数</p>
      <div class="range-container">
        <input type="number" id="quizCountInput" value="10" min="1">
        <span>問</span>
      </div>
      <div id="countError" class="error-text">範囲内の語数以下を指定してください</div>
      <div style="margin-top: 32px;">
        <button class="btn" onclick="startQuiz('choice')">4択テストを開始</button>
        <button class="btn" onclick="startQuiz('typing')">記述テストを開始</button>
        <button style="margin-top: 16px; display: block; width: 100%; text-align: center; padding: 8px;" onclick="showWordList()">単語一覧を確認</button>
      </div>
    </div>
  </div>

  <!-- Quiz Screen (Normal) -->
  <div id="quizScreen" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
      <span id="quizProgress">1 / 10</span>
      <button onclick="quitQuiz()">終了</button>
      <span id="quizScore" style="color:#2563eb; font-weight: bold;">正解: 0</span>
    </div>
    <div class="card" style="text-align: center; margin: 40px 0;">
      <div id="questionText" style="font-size: 28px; font-weight: bold; margin-bottom: 8px; word-break: break-word;">word</div>
      <div id="questionHint" style="color: #666; font-size: 14px; word-break: break-word;"></div>
    </div>
    <div id="choiceContainer">
      <!-- Choices will be injected here -->
    </div>
    <div id="typingContainer" class="hidden" style="text-align: center;">
      <input type="text" id="typingInput" style="width: 100%; padding: 12px; font-size: 18px; margin-bottom: 16px; text-align: center;" placeholder="英単語を入力" autocomplete="off" spellcheck="false">
      <button class="btn" id="typingSubmitBtn" onclick="checkTypingAnswer()">回答を確定</button>
    </div>
    <div id="feedbackArea" style="text-align: center; margin-top: 16px; font-weight: bold; font-size: 18px; min-height: 1.5em; word-break: break-word;"></div>
    <button id="nextBtn" class="btn hidden" style="margin-top: 24px; background-color: #333; color: white;" onclick="nextQuestion()">次へ進む</button>
  </div>

  <!-- Result Summary Screen (Normal) -->
  <div id="resultScreen" class="hidden">
    <header style="text-align: center;">
      <h1 style="color:#2563eb">結果レポート</h1>
    </header>
    <div class="card" style="margin-bottom:24px; text-align: center;">
      <div style="background-color: #eff6ff; border: 1px solid #bfdbfe; padding:24px;">
        <h2 style="margin:0; color: #2563eb; font-size: 24px;" id="finalScore">7 / 10 正解</h2>
      </div>
    </div>
    <div id="resultList">
      <!-- Word summary here -->
    </div>
    <button class="btn" style="margin-top: 24px;" onclick="retryCurrentSet()">同じ条件でもう一度挑戦</button>
    <button class="btn" onclick="showScreen('modeScreen')">メニューに戻る</button>
  </div>

  <!-- Word List View -->
  <div id="wordListScreen" class="hidden">
    <div style="display:flex; align-items:center; margin-bottom: 24px; gap: 16px;">
      <button onclick="showScreen('modeScreen')">✕</button>
      <h2 style="margin:0;">単語リスト</h2>
    </div>
    
    <!-- リアルタイム検索エリア -->
    <div class="search-container">
      <input type="text" id="wordSearchInput" class="search-input" placeholder="英単語または意味で検索..." oninput="filterWordList()">
    </div>

    <div class="card">
      <div id="wordListScrollArea" class="word-table-wrapper">
        <table class="word-table">
          <thead>
            <tr>
              <th width="60">No.</th>
              <th>単語</th>
              <th>意味</th>
            </tr>
          </thead>
          <tbody id="wordTableBody">
            <!-- Words will be injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ============================================== -->
  <!-- 語彙テスト出題画面 (Vocab Test Screen) -->
  <!-- ============================================== -->
  <div id="vocabTestScreen" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;">
      <span id="vocabTestProgress" style="font-weight: bold; font-size: 16px;">セット 1 / 12</span>
      <span id="vocabTimerDisplay" class="timer-text">30:00</span>
      <button onclick="confirmFinishVocabTest()" style="background-color: #dc2626; color: white; border: none; border-radius: 4px; padding: 6px 12px; font-weight: bold;">テストを終了して採点</button>
    </div>

    <!-- 5問一括表示コンテナ -->
    <div id="vocabSetDisplayContainer" class="card" style="margin: 16px 0; border: none; padding: 0; background: transparent;">
      <!-- JavaScriptで上部5つの英単語＆下部共通10選択肢、または記述問題が注入されます -->
    </div>

    <!-- 戻る・進むナビゲーション（常に表示） -->
    <div class="vocab-nav-bar">
      <button id="vocabPrevBtn" class="vocab-nav-btn" onclick="vocabPrevStep()">◀ 前のセットへ</button>
      <button id="vocabNextBtn" class="vocab-nav-btn" onclick="vocabNextStep()">次のセットへ ▶</button>
    </div>

    <!-- 問題ジャンプグリッド -->
    <p style="margin: 24px 0 6px 0; font-size: 13px; font-weight: bold; color: #555;">問題ジャンプ（青：解答済 / 枠：現在）</p>
    <div id="vocabProgressGrid" class="vocab-progress-grid">
      <!-- セクションナビゲーションボタンがJSで注入されます -->
    </div>
  </div>

  <!-- ============================================== -->
  <!-- 語彙テスト結果画面 (Vocab Result Screen) -->
  <!-- ============================================== -->
  <div id="vocabResultScreen" class="hidden">
    <header style="text-align: center;">
      <h1 style="color:#2563eb; margin-bottom: 4px;">語彙テスト結果レポート</h1>
      <p id="vocabResultMeta" style="color: #666; margin: 0; font-weight: bold; font-size: 14px;"></p>
    </header>

    <!-- 点数表示 -->
    <div class="card" style="margin: 24px 0; text-align: center;">
      <div style="background-color: #eff6ff; border: 2px solid #2563eb; padding: 24px; border-radius: 12px;">
        <p style="margin: 0 0 6px 0; font-size: 14px; font-weight: bold; color: #1e40af;">あなたの得点</p>
        <h2 style="margin:0; color: #2563eb; font-size: 40px; font-weight: bold;" id="vocabFinalScore">0 / 80点</h2>
        <p id="vocabResultEvaluation" style="margin: 8px 0 0 0; font-weight: bold; color: #333; font-size: 15px;"></p>
      </div>
    </div>

    <h3 style="border-bottom: 2px solid #ccc; padding-bottom: 6px; margin-bottom: 16px;">解答詳細一覧</h3>
    <div id="vocabResultDetailList" class="vocab-result-details">
      <!-- 各問題の正解、回答、正誤、ダミー対応表を動的に出力 -->
    </div>

    <button class="btn test-btn-primary" style="margin-top: 24px; padding: 14px;" onclick="showScreen('startScreen')">トップメニューに戻る</button>
  </div>

</div>

<script>
let allWords = [];
let currentPool = [];
let quizSet = [];
let currentIndex = 0;
let score = 0;
let sessionResults = [];
let currentQuizMode = '';
let totalQuestions = 10;

/* --- 語彙テスト専用状態変数 --- */
let vocabTestActive = false;
let vocabTestQuestions = []; // 80問すべてを保持
let currentVocabStep = 0; // 現在進行中のステップ (0〜11: Q1〜Q60の12セット, 12〜31: Q61〜Q80の記述20問)
let activeSubQuestionIdx = 0; // 5問セット中で現在キー入力を受け付けるサブインデックス (0〜4)
let vocabTimerInterval = null;
let vocabStartTime = 0;
const VOCAB_TOTAL_TIME = 30 * 60 * 1000; // 30分（ミリ秒）

/* 「[名]」や「[他動]」などのカッコを自動で四角バッジにする関数 */
function formatMeaning(meaningText) {
  if (!meaningText) return '';
  return meaningText.replace(/\[([^\]]+)\]/g, (match, partOfSpeech) => {
    return `<span class="part-of-speech-badge">${partOfSpeech}</span>`;
  });
}

/* 単語のテキスト（スペル）をキーにしてLEAPのNo.を検索・取得するヘルパー関数 */
function getLeapNoByWord(wordText) {
  const match = allWords.find(w => w.word.toLowerCase() === wordText.toLowerCase());
  return match ? match.no : null;
}

async function fetchLeapData() {
  const targetUrl = "https://ukaru-eigo.com/leap-modified-list/";
  const loadingText = document.getElementById('loadingText');
  
  try {
    const res = await fetch(`https://proxy.cors.sh/${targetUrl}`);
    if (!res.ok) throw new Error();
    const html = await res.text();
    
    if (html && html.includes('tablepress-55')) {
      parseWords(html);
    } else {
      throw new Error();
    }
  } catch (e) {
    loadingText.innerHTML = '<span style="color:#ef4444">データの取得に失敗しました。再読み込みしてください。</span>';
  }
}

function parseWords(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const rows = doc.querySelectorAll('#tablepress-55 tbody tr');
  allWords = Array.from(rows).map(row => {
    const cols = row.querySelectorAll('td');
    return {
      no: parseInt(cols[0].textContent),
      word: cols[1].textContent.trim(),
      meaning: cols[2].textContent.trim()
    };
  }).filter(w => !isNaN(w.no));

  if (allWords.length > 0) {
    showScreen('startScreen');
  } else {
    document.getElementById('loadingText').innerText = "パースエラー: データが見つかりません。";
  }
}

function showScreen(screenId) {
  document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
  document.getElementById(screenId).classList.remove('hidden');
  window.scrollTo(0,0);
}

function selectPart(btn, start, end) {
  const isActive = btn.classList.contains('active');
  document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
  if (isActive) {
    document.getElementById('rangeStart').value = "";
    document.getElementById('rangeEnd').value = "";
  } else {
    btn.classList.add('active');
    document.getElementById('rangeStart').value = start;
    document.getElementById('rangeEnd').value = end;
  }
}

function validateRange() {
  const startVal = document.getElementById('rangeStart').value;
  const endVal = document.getElementById('rangeEnd').value;
  const start = parseInt(startVal);
  const end = parseInt(endVal);
  const error = document.getElementById('rangeError');
  
  if (startVal === "" || endVal === "" || isNaN(start) || isNaN(end) || start < 1 || end > allWords.length || start > end) {
    error.style.display = 'block';
  } else {
    error.style.display = 'none';
    startWithRange(start, end);
  }
}

function startWithRange(start, end) {
  currentPool = allWords.filter(w => w.no >= start && w.no <= end);
  const poolSize = currentPool.length;
  document.getElementById('modeTitle').innerText = `範囲: ${start} - ${end}`;
  const quizCountInput = document.getElementById('quizCountInput');
  quizCountInput.value = poolSize < 10 ? poolSize : 10;
  document.getElementById('countError').style.display = 'none';
  showScreen('modeScreen');
}

function showWordList() {
  document.getElementById('wordSearchInput').value = '';
  renderWordTable(currentPool);
  showScreen('wordListScreen');
  
  const scrollArea = document.getElementById('wordListScrollArea');
  if (scrollArea) {
    scrollArea.scrollTop = 0;
  }
}

function renderWordTable(wordsToRender) {
  const tbody = document.getElementById('wordTableBody');
  tbody.innerHTML = '';
  
  if (wordsToRender.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="3" style="text-align: center; color: #666;">一致する単語が見つかりません</td>`;
    tbody.appendChild(tr);
    return;
  }

  wordsToRender.forEach(w => {
    const tr = document.createElement('tr');
    const formattedMeaningText = formatMeaning(w.meaning);
    tr.innerHTML = `<td style="font-weight:bold;">${w.no}</td><td style="font-weight:bold;">${w.word}</td><td>${formattedMeaningText}</td>`;
    tbody.appendChild(tr);
  });
}

function filterWordList() {
  const query = document.getElementById('wordSearchInput').value.toLowerCase().trim();
  if (query === '') {
    renderWordTable(currentPool);
    return;
  }
  
  const filtered = currentPool.filter(w => {
    return w.word.toLowerCase().includes(query) || w.meaning.toLowerCase().includes(query);
  });
  
  renderWordTable(filtered);
}

function startQuiz(mode) {
  const countInput = document.getElementById('quizCountInput');
  const count = parseInt(countInput.value);
  const error = document.getElementById('countError');
  if (isNaN(count) || count < 1 || count > currentPool.length) {
    error.style.display = 'block';
    return;
  }
  error.style.display = 'none';
  currentQuizMode = mode;
  totalQuestions = count;
  score = 0;
  currentIndex = 0;
  sessionResults = [];
  quizSet = [...currentPool].sort(() => 0.5 - Math.random()).slice(0, totalQuestions);
  showScreen('quizScreen');
  renderQuestion();
}

function retryCurrentSet() {
  score = 0;
  currentIndex = 0;
  sessionResults = [];
  quizSet = [...currentPool].sort(() => 0.5 - Math.random()).slice(0, totalQuestions);
  showScreen('quizScreen');
  renderQuestion();
}

function quitQuiz() {
  showResults();
}

function renderQuestion() {
  const word = quizSet[currentIndex];
  document.getElementById('quizProgress').innerText = `${currentIndex + 1} / ${totalQuestions}`;
  document.getElementById('quizScore').innerText = `正解: ${score}`;
  document.getElementById('feedbackArea').innerText = '';
  document.getElementById('nextBtn').classList.add('hidden');
  
  if (currentQuizMode === 'choice') {
    document.getElementById('questionText').innerText = word.word;
    document.getElementById('questionHint').innerText = '意味を選択してください';
    document.getElementById('choiceContainer').classList.remove('hidden');
    document.getElementById('typingContainer').classList.add('hidden');
    renderChoices(word);
  } else {
    document.getElementById('questionText').innerHTML = formatMeaning(word.meaning);
    document.getElementById('questionHint').innerText = '英単語を入力してください';
    document.getElementById('choiceContainer').classList.add('hidden');
    document.getElementById('typingContainer').classList.remove('hidden');
    const input = document.getElementById('typingInput');
    input.value = '';
    input.disabled = false;
    input.focus();
    document.getElementById('typingSubmitBtn').disabled = false;
  }
}

function renderChoices(correctWord) {
  const container = document.getElementById('choiceContainer');
  container.innerHTML = '';
  let distractors = allWords
    .filter(w => w.word !== correctWord.word)
    .sort(() => 0.5 - Math.random())
    .slice(0, 3);
  let choices = [...distractors, correctWord].sort(() => 0.5 - Math.random());
  
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = formatMeaning(choice.meaning);
    btn.onclick = () => checkChoiceAnswer(btn, choice.word === correctWord.word);
    container.appendChild(btn);
  });
}

function checkChoiceAnswer(btn, isCorrect) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.onclick = null);
  const correctWord = quizSet[currentIndex];
  sessionResults.push({ word: correctWord.word, meaning: correctWord.meaning, correct: isCorrect });
  
  const formattedCorrectMeaning = formatMeaning(correctWord.meaning);

  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    document.getElementById('feedbackArea').innerHTML = '<span style="color:#059669">正解です！</span>';
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedbackArea').innerHTML = `<span style="color:#dc2626">不正解 (正解: ${formattedCorrectMeaning})</span>`;
    btns.forEach(b => {
      if (b.innerHTML === formattedCorrectMeaning) {
        b.classList.add('correct');
      }
    });
  }
  document.getElementById('nextBtn').classList.remove('hidden');
}

function checkTypingAnswer() {
  const input = document.getElementById('typingInput');
  const userAns = input.value.trim().toLowerCase();
  const correctWord = quizSet[currentIndex];
  const isCorrect = userAns === correctWord.word.toLowerCase();
  input.disabled = true;
  document.getElementById('typingSubmitBtn').disabled = true;
  sessionResults.push({ word: correctWord.word, meaning: correctWord.meaning, correct: isCorrect });
  
  if (isCorrect) {
    score++;
    document.getElementById('feedbackArea').innerHTML = '<span style="color:#059669">正解です！</span>';
  } else {
    document.getElementById('feedbackArea').innerHTML = `<span style="color:#dc2626">不正解 (正解: ${correctWord.word})</span>`;
  }
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < totalQuestions) {
    renderQuestion();
  } else {
    showResults();
  }
}

/* ========================================================== */
/* 通常クイズ（4択・記述）の結果レポート画面 (LEAP No.併記対応) */
/* ========================================================== */
function showResults() {
  showScreen('resultScreen');
  const answeredCount = sessionResults.length;
  document.getElementById('finalScore').innerText = `${answeredCount}問中 ${score}問 正解`;
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  
  sessionResults.forEach(res => {
    const div = document.createElement('div');
    div.className = 'result-item';
    const formattedResultMeaning = formatMeaning(res.meaning);
    
    // 対象英単語のLEAP No.を検索取得して併記
    const leapNo = getLeapNoByWord(res.word);
    const leapNoLabel = leapNo ? `<span style="font-size: 11px; color: #2563eb; margin-left: 6px;">(No.${leapNo})</span>` : '';
    
    div.innerHTML = `
      <div style="flex: 1; min-width: 0; padding-right: 8px;">
        <div style="font-weight:bold; font-size:16px; word-break: break-word;">${res.word}${leapNoLabel}</div>
        <div style="font-size:12px; color:#666; word-break: break-word;">${formattedResultMeaning}</div>
      </div>
      <div style="font-size: 20px; font-weight: bold; color: ${res.correct ? '#059669' : '#dc2626'}; flex-shrink: 0;">
        ${res.correct ? '●' : '✕'}
      </div>
    `;
    list.appendChild(div);
  });
  
  if (answeredCount === 0) {
    list.innerHTML = '<p style="text-align:center; color:#666;">回答した問題はありません。</p>';
  }
}

/* ========================================================== */
/* --- 語彙テストモードの実装（5問並列上部表示・共通選択肢下部表示） --- */
/* ========================================================== */

/* テスト生成 & 画面初期化 */
function initVocabTest() {
  if (allWords.length < 80) {
    return;
  }
  
  const shuffledAll = [...allWords].sort(() => 0.5 - Math.random());
  const selectedWords = shuffledAll.slice(0, 80);
  const unusedPool = shuffledAll.slice(80);
  
  vocabTestQuestions = [];
  
  // Q1～Q60（選択12セット × 5問）
  for (let setIdx = 0; setIdx < 12; setIdx++) {
    const correctWordsInSet = selectedWords.slice(setIdx * 5, (setIdx + 1) * 5);
    const dummyWordsInSet = unusedPool.slice(setIdx * 5, (setIdx + 1) * 5);
    const unifiedChoices = [...correctWordsInSet, ...dummyWordsInSet].sort(() => 0.5 - Math.random());
    
    for (let qIdx = 0; qIdx < 5; qIdx++) {
      const correctWord = correctWordsInSet[qIdx];
      vocabTestQuestions.push({
        id: (setIdx * 5) + qIdx + 1, // 1〜60
        type: 'choice',
        word: correctWord.word,
        meaning: correctWord.meaning,
        correctWordObj: correctWord,
        setIndex: setIdx,
        choices: unifiedChoices, // 同一10択
        userAnswerIndex: null // 回答選択肢インデックス
      });
    }
  }
  
  // Q61～Q80（記述20問）
  for (let k = 0; k < 20; k++) {
    const correctWord = selectedWords[60 + k];
    const wordText = correctWord.word;
    const firstChar = wordText.charAt(0);
    
    let displayHint = firstChar;
    for (let i = 1; i < wordText.length; i++) {
      const char = wordText.charAt(i);
      if (/[a-zA-Z]/.test(char)) {
        displayHint += "・";
      } else {
        displayHint += char;
      }
    }
    
    vocabTestQuestions.push({
      id: 61 + k, // 61〜80
      type: 'typing',
      word: wordText,
      meaning: correctWord.meaning,
      correctWordObj: correctWord,
      displayHint: displayHint,
      userAnswerText: '' // 記述回答
    });
  }
  
  currentVocabStep = 0; 
  activeSubQuestionIdx = 0; // 0〜4番目のうち最初に選択されるインデックス
  vocabTestActive = true;
  
  showScreen('vocabTestScreen');
  renderVocabStep();
  renderVocabProgressGrid();
  startVocabTimer();
}

/* タイマー（絶対時間優先） */
function startVocabTimer() {
  if (vocabTimerInterval) clearInterval(vocabTimerInterval);
  vocabStartTime = Date.now();
  
  vocabTimerInterval = setInterval(() => {
    const elapsed = Date.now() - vocabStartTime;
    const remaining = VOCAB_TOTAL_TIME - elapsed;
    
    if (remaining <= 0) {
      clearInterval(vocabTimerInterval);
      document.getElementById('vocabTimerDisplay').innerText = "00:00";
      finishVocabTest();
      return;
    }
    
    const minutes = Math.floor(remaining / 60000);
    const seconds = Math.floor((remaining % 60000) / 1000);
    const minStr = String(minutes).padStart(2, '0');
    const secStr = String(seconds).padStart(2, '0');
    
    document.getElementById('vocabTimerDisplay').innerText = `${minStr}:${secStr}`;
  }, 250);
}

/* ステップ描写 (5問英単語上部、共通選択肢下部、または記述1問) */
function renderVocabStep() {
  const container = document.getElementById('vocabSetDisplayContainer');
  container.innerHTML = '';
  
  const stepProgressText = document.getElementById('vocabTestProgress');
  
  if (currentVocabStep < 12) {
    // 【選択問題フェーズ】
    stepProgressText.innerText = `選択セット ${currentVocabStep + 1} / 12`;
    
    const startIndex = currentVocabStep * 5;
    const targetQuestions = vocabTestQuestions.slice(startIndex, startIndex + 5);
    const sharedChoices = targetQuestions[0].choices;
    
    // ------------------------------------------------
    // 1. 【上部：5つの英単語カードを表示】
    // ------------------------------------------------
    const topContainer = document.createElement('div');
    topContainer.className = 'vocab-top-words-container';
    
    targetQuestions.forEach((q, subIdx) => {
      const card = document.createElement('div');
      card.className = `vocab-word-card ${activeSubQuestionIdx === subIdx ? 'active-focus' : ''}`;
      card.id = `vocab-word-card-${subIdx}`;
      
      // タップでその単語をアクティブに選択
      card.onclick = () => {
        setActiveSubQuestion(subIdx);
      };
      
      // 回答バッジの表記内容
      let badgeLabel = "未";
      let isAnswered = false;
      if (q.userAnswerIndex !== null) {
        const choiceNum = q.userAnswerIndex === 9 ? '0' : String(q.userAnswerIndex + 1);
        badgeLabel = `選択: ${choiceNum}`;
        isAnswered = true;
      }
      
      card.innerHTML = `
        <div class="vocab-card-num">Q${q.id}</div>
        <div class="vocab-card-word">${q.word}</div>
        <div class="vocab-card-ans-badge ${isAnswered ? 'has-ans' : ''}">${badgeLabel}</div>
      `;
      topContainer.appendChild(card);
    });
    
    container.appendChild(topContainer);
    
    // ------------------------------------------------
    // 2. 【下部：共通の10個の選択肢を1つだけ表示】
    // ------------------------------------------------
    const choicesBox = document.createElement('div');
    choicesBox.className = 'vocab-shared-choices-box';
    
    const choicesTitle = document.createElement('div');
    choicesTitle.className = 'vocab-shared-choices-title';
    choicesTitle.innerText = `【共通選択肢】現在アクティブ（太青枠）な単語の意味を選んでください`;
    choicesBox.appendChild(choicesTitle);
    
    const sharedGrid = document.createElement('div');
    sharedGrid.className = 'vocab-shared-choice-grid';
    
    // 現在アクティブな設問の回答状況を取り出しておく
    const activeQ = targetQuestions[activeSubQuestionIdx];
    
    sharedChoices.forEach((choice, choiceIdx) => {
      const choiceBtn = document.createElement('button');
      choiceBtn.className = 'vocab-shared-choice-item';
      
      // 現在アクティブな設問でこの選択肢が選ばれている場合は色を強調
      if (activeQ.userAnswerIndex === choiceIdx) {
        choiceBtn.classList.add('selected-for-active');
      }
      
      const keyLabel = choiceIdx === 9 ? '0' : String(choiceIdx + 1);
      const formattedChoiceMeaning = formatMeaning(choice.meaning);
      
      choiceBtn.innerHTML = `<span class="choice-num-key">${keyLabel}</span>${formattedChoiceMeaning}`;
      
      // 選択肢タップ時の処理
      choiceBtn.onclick = () => {
        const globalIdx = startIndex + activeSubQuestionIdx;
        selectVocabChoiceInSet(globalIdx, choiceIdx);
      };
      
      sharedGrid.appendChild(choiceBtn);
    });
    
    choicesBox.appendChild(sharedGrid);
    container.appendChild(choicesBox);
    
  } else {
    // 【記述問題フェーズ (Q61〜Q80)】
    const qIdx = 60 + (currentVocabStep - 12);
    const q = vocabTestQuestions[qIdx];
    
    stepProgressText.innerText = `記述問題 ${currentVocabStep - 11} / 20`;
    
    const descBlock = document.createElement('div');
    descBlock.style.textAlign = 'center';
    descBlock.style.backgroundColor = '#fff';
    descBlock.style.border = '1px solid #ccc';
    descBlock.style.borderRadius = '8px';
    descBlock.style.padding = '24px';
    descBlock.innerHTML = `
      <div style="font-size: 16px; color: #666; font-weight: bold;">第 ${q.id} 問 (記述問題)</div>
      <div style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #111;">
        ${formatMeaning(q.meaning)} <span style="color:#2563eb; font-weight: normal; font-size: 22px;">(${q.displayHint})</span>
      </div>
      <p style="color: #666; font-size: 13px; margin: 0 0 16px 0;">意味と頭文字・文字数ヒントを参考に、英単語を直接入力してください。</p>
    `;
    
    const inputArea = document.createElement('div');
    inputArea.style.maxWidth = '400px';
    inputArea.style.margin = '0 auto';
    
    const input = document.createElement('input');
    input.type = 'text';
    input.id = 'vocabTypingInput';
    input.value = q.userAnswerText;
    input.placeholder = '英単語を入力';
    input.style.width = '100%';
    input.style.padding = '14px';
    input.style.fontSize = '18px';
    input.style.textAlign = 'center';
    input.style.border = '2px solid #ccc';
    input.style.borderRadius = '8px';
    input.autocomplete = 'off';
    input.spellcheck = false;
    
    input.oninput = () => {
      q.userAnswerText = input.value;
      updateVocabProgressGridAnswered();
    };
    
    inputArea.appendChild(input);
    descBlock.appendChild(inputArea);
    container.appendChild(descBlock);
    
    setTimeout(() => input.focus(), 50);
  }
  
  // ナビゲーションボタンは常に使用可能（disabledの解除）
  document.getElementById('vocabPrevBtn').disabled = currentVocabStep === 0;
  
  const nextBtn = document.getElementById('vocabNextBtn');
  if (currentVocabStep === 31) {
    nextBtn.innerText = 'テスト終了 採点へ';
    nextBtn.onclick = confirmFinishVocabTest;
  } else {
    nextBtn.innerText = '次のセットへ ▶';
    nextBtn.onclick = vocabNextStep;
  }
  
  updateVocabProgressGridCurrent();
}

/* 5枚カード内の任意フォーカス切り替え */
function setActiveSubQuestion(subIdx) {
  activeSubQuestionIdx = subIdx;
  
  // HTML要素クラスの切り替え
  for (let i = 0; i < 5; i++) {
    const el = document.getElementById(`vocab-word-card-${i}`);
    if (el) {
      if (i === subIdx) {
        el.classList.add('active-focus');
      } else {
        el.classList.remove('active-focus');
      }
    }
  }
  
  // 選択肢側のハイライト情報などを同期するために再描画
  renderVocabStep();
}

/* 解答決定時の処理（回答後は順次右隣のカードへ自動フォーカス移動） */
function selectVocabChoiceInSet(questionGlobalIdx, choiceIdx) {
  const q = vocabTestQuestions[questionGlobalIdx];
  q.userAnswerIndex = choiceIdx;
  
  // 答えたら自動的に次のカードにフォーカスを移動する (5枚目ならそのまま)
  if (activeSubQuestionIdx < 4) {
    activeSubQuestionIdx++;
  }
  
  // 画面全体を再描画して、上部カード内のバッジと下部選択肢を最新に更新
  renderVocabStep();
  updateVocabProgressGridAnswered();
}

/* 前後のステップ移動 */
function vocabPrevStep() {
  if (currentVocabStep > 0) {
    currentVocabStep--;
    activeSubQuestionIdx = 0;
    renderVocabStep();
  }
}
function vocabNextStep() {
  if (currentVocabStep < 31) {
    currentVocabStep++;
    activeSubQuestionIdx = 0;
    renderVocabStep();
  }
}

/* ナビゲーション進捗セルの初期生成 */
function renderVocabProgressGrid() {
  const grid = document.getElementById('vocabProgressGrid');
  grid.innerHTML = '';
  
  for (let i = 0; i < 32; i++) {
    const cell = document.createElement('div');
    cell.className = 'vocab-progress-cell';
    
    if (i < 12) {
      cell.innerText = `S${i + 1}`; // セット 1〜12
    } else {
      cell.innerText = `Q${60 + (i - 11)}`; // 記述 Q61〜Q80
    }
    
    cell.onclick = () => {
      currentVocabStep = i;
      activeSubQuestionIdx = 0;
      renderVocabStep();
    };
    grid.appendChild(cell);
  }
  updateVocabProgressGridAnswered();
}

/* 解答済みセルの表示更新 */
function updateVocabProgressGridAnswered() {
  const cells = document.querySelectorAll('.vocab-progress-cell');
  
  // 前半12セット分
  for (let setIdx = 0; setIdx < 12; setIdx++) {
    if (!cells[setIdx]) continue;
    
    const startIndex = setIdx * 5;
    const targetQs = vocabTestQuestions.slice(startIndex, startIndex + 5);
    const allAnswered = targetQs.every(q => q.userAnswerIndex !== null);
    const anyAnswered = targetQs.some(q => q.userAnswerIndex !== null);
    
    if (allAnswered) {
      cells[setIdx].classList.add('answered');
      cells[setIdx].style.opacity = '1.0';
    } else if (anyAnswered) {
      cells[setIdx].classList.add('answered');
      cells[setIdx].style.opacity = '0.6';
    } else {
      cells[setIdx].classList.remove('answered');
      cells[setIdx].style.opacity = '1.0';
    }
  }
  
  // 後半記述20問分
  for (let k = 0; k < 20; k++) {
    const cellIdx = 12 + k;
    if (!cells[cellIdx]) continue;
    
    const q = vocabTestQuestions[60 + k];
    if (q.userAnswerText && q.userAnswerText.trim() !== '') {
      cells[cellIdx].classList.add('answered');
    } else {
      cells[cellIdx].classList.remove('answered');
    }
  }
}

/* 現在地セルのハイライト枠同期 */
function updateVocabProgressGridCurrent() {
  const cells = document.querySelectorAll('.vocab-progress-cell');
  cells.forEach((cell, idx) => {
    if (idx === currentVocabStep) {
      cell.classList.add('current');
    } else {
      cell.classList.remove('current');
    }
  });
}

/* 採点処理の実行 */
function confirmFinishVocabTest() {
  finishVocabTest();
}

/* 採点の実行 & 結果画面出力 (LEAP No.併記対応) */
function finishVocabTest() {
  vocabTestActive = false;
  if (vocabTimerInterval) {
    clearInterval(vocabTimerInterval);
  }
  
  let correctCount = 0;
  
  vocabTestQuestions.forEach(q => {
    if (q.type === 'choice') {
      if (q.userAnswerIndex !== null) {
        const selectedChoiceObj = q.choices[q.userAnswerIndex];
        if (selectedChoiceObj.word === q.correctWordObj.word) {
          correctCount++;
          q.isCorrect = true;
        } else {
          q.isCorrect = false;
        }
      } else {
        q.isCorrect = false;
      }
    } else {
      // 記述
      const ans = q.userAnswerText.trim().toLowerCase();
      const target = q.word.toLowerCase();
      if (ans === target) {
        correctCount++;
        q.isCorrect = true;
      } else {
        q.isCorrect = false;
      }
    }
  });
  
  showScreen('vocabResultScreen');
  
  const elapsed = Date.now() - vocabStartTime;
  const minutes = Math.floor(elapsed / 60000);
  const seconds = Math.floor((elapsed % 60000) / 1000);
  document.getElementById('vocabResultMeta').innerText = `所要時間: ${minutes}分${seconds}秒 / 制限時間 30分`;
  
  document.getElementById('vocabFinalScore').innerText = `${correctCount} / 80 点`;
  
  let evalText = '';
  const scorePercent = (correctCount / 80) * 100;
  if (scorePercent === 100) {
    evalText = "完璧です！驚異的な単語マスターレベルです！";
  } else if (scorePercent >= 90) {
    evalText = "素晴らしい実力です！応用レベルに非常に強いです。";
  } else if (scorePercent >= 75) {
    evalText = "高得点です！この調子で完全に定着させましょう。";
  } else if (scorePercent >= 50) {
    evalText = "まずまずの結果です。間違えた単語をよく復習しましょう。";
  } else {
    evalText = "まだまだ伸びしろがあります！単語リストで復習を重ねましょう。";
  }
  document.getElementById('vocabResultEvaluation').innerText = evalText;
  
  renderVocabResultList();
}

/* 語彙テスト結果リスト詳細を描画 (LEAP No.併記対応) */
function renderVocabResultList() {
  const container = document.getElementById('vocabResultDetailList');
  container.innerHTML = '';
  
  // 12セットの選択肢リスト情報
  for (let setIdx = 0; setIdx < 12; setIdx++) {
    const setHeader = document.createElement('h4');
    setHeader.style.margin = '32px 0 12px 0';
    setHeader.style.color = '#2563eb';
    setHeader.style.borderLeft = '4px solid #2563eb';
    setHeader.style.paddingLeft = '8px';
    setHeader.innerText = `第 ${setIdx + 1} セット (Q${setIdx * 5 + 1} ～ Q${(setIdx + 1) * 5})`;
    container.appendChild(setHeader);
    
    for (let qIdx = 0; qIdx < 5; qIdx++) {
      const q = vocabTestQuestions[setIdx * 5 + qIdx];
      const card = document.createElement('div');
      card.className = 'vocab-result-card';
      
      const userAnswerText = q.userAnswerIndex !== null ? q.choices[q.userAnswerIndex].meaning : '未回答';
      const formattedCorrect = formatMeaning(q.meaning);
      const formattedUserAns = q.userAnswerIndex !== null ? formatMeaning(userAnswerText) : '<span style="color:#666;">（未回答）</span>';
      
      // 出題単語のLEAP No.を併記
      const leapNo = getLeapNoByWord(q.word);
      const leapNoLabel = leapNo ? `<span style="font-size: 12px; color: #2563eb; margin-left: 6px;">(No.${leapNo})</span>` : '';
      
      card.innerHTML = `
        <div class="vocab-result-header-row">
          <span style="font-weight:bold;">[Q${q.id}] ${q.word}${leapNoLabel}</span>
          <span style="font-size:18px; font-weight:bold; color:${q.isCorrect ? '#059669' : '#dc2626'}">
            ${q.isCorrect ? '○ 正解' : '✕ 不正解'}
          </span>
        </div>
        <div><strong>正解の意味:</strong> ${formattedCorrect}</div>
        <div style="margin-top:4px;"><strong>あなたの回答:</strong> ${formattedUserAns}</div>
      `;
      container.appendChild(card);
    }
    
    // 5問1セットに対応する10個の選択肢の本来の英語対応表示
    const mappingBox = document.createElement('div');
    mappingBox.className = 'mapping-box';
    
    const setQ = vocabTestQuestions[setIdx * 5];
    const choicesList = setQ.choices;
    
    let listHTML = `<ul class="mapping-list">`;
    choicesList.forEach((item, index) => {
      const isCorrectForSet = vocabTestQuestions.slice(setIdx * 5, (setIdx + 1) * 5).some(correctQ => correctQ.word === item.word);
      const label = isCorrectForSet ? `<span style="color:#059669; font-weight:bold;">(出題された単語)</span>` : `<span style="color:#666;">(ダミー選択肢)</span>`;
      const formattedItemMeaning = formatMeaning(item.meaning);
      
      // ダミー含む全選択肢の英単語にLEAP No.を検索・併記
      const choiceLeapNo = getLeapNoByWord(item.word);
      const choiceLeapLabel = choiceLeapNo ? `<span style="color:#2563eb; font-weight:normal; font-size:11px;">(No.${choiceLeapNo})</span>` : '';
      
      listHTML += `<li style="margin-bottom:4px;"><strong>${item.word}</strong> ${choiceLeapLabel} ➔ ${formattedItemMeaning} ${label}</li>`;
    });
    listHTML += `</ul>`;
    
    mappingBox.innerHTML = `
      <details>
        <summary style="font-weight:bold; cursor:pointer; font-size:13px; color:#555;">
          第 ${setIdx + 1} セットで提示された10個の選択肢に対応する本来の英語を確認する (ダミー対応表示)
        </summary>
        <div style="margin-top:10px; border-top:1px solid #ccc; padding-top:10px;">
          ${listHTML}
        </div>
      </details>
    `;
    container.appendChild(mappingBox);
  }
  
  // 記述問題20問（Q61〜Q80）の出力
  const typingHeader = document.createElement('h4');
  typingHeader.style.margin = '40px 0 12px 0';
  typingHeader.style.color = '#2563eb';
  typingHeader.style.borderLeft = '4px solid #2563eb';
  typingHeader.style.paddingLeft = '8px';
  typingHeader.innerText = `Q61 ～ Q80 (記述問題)`;
  container.appendChild(typingHeader);
  
  for (let k = 0; k < 20; k++) {
    const q = vocabTestQuestions[60 + k];
    const card = document.createElement('div');
    card.className = 'vocab-result-card';
    
    const formattedMeaningText = formatMeaning(q.meaning);
    const userDisplayAns = q.userAnswerText.trim() !== '' ? q.userAnswerText.trim() : '<span style="color:#666;">（未回答）</span>';
    
    // 正解英単語のLEAP No.を取得して併記
    const leapNo = getLeapNoByWord(q.word);
    const leapNoLabel = leapNo ? `<span style="font-size: 13px; color: #2563eb; margin-left: 6px;">(No.${leapNo})</span>` : '';
    
    card.innerHTML = `
      <div class="vocab-result-header-row">
        <span style="font-weight:bold;">第 ${q.id} 問: ${formattedMeaningText} (${q.displayHint})</span>
        <span style="font-size:18px; font-weight:bold; color:${q.isCorrect ? '#059669' : '#dc2626'}">
          ${q.isCorrect ? '○ 正解' : '✕ 不正解'}
        </span>
      </div>
      <div><strong>正解の英単語:</strong> <strong style="color:#2563eb; font-size:16px;">${q.word}</strong>${leapNoLabel}</div>
      <div style="margin-top:4px;"><strong>あなたの回答:</strong> <span style="font-size:15px;">${userDisplayAns}</span></div>
    `;
    container.appendChild(card);
  }
}

/* ========================================================== */
/* --- イベント処理の統合 --- */
/* ========================================================== */

// 語彙テスト解答中のキーボード入力を拾う
document.addEventListener('keydown', (e) => {
  if (vocabTestActive && currentVocabStep < 12) {
    const key = e.key;
    if (/[1-9]/.test(key)) {
      e.preventDefault();
      const idx = parseInt(key) - 1;
      const globalIdx = (currentVocabStep * 5) + activeSubQuestionIdx;
      selectVocabChoiceInSet(globalIdx, idx);
    } else if (key === '0') {
      e.preventDefault();
      const globalIdx = (currentVocabStep * 5) + activeSubQuestionIdx;
      selectVocabChoiceInSet(globalIdx, 9);
    } else if (key === 'ArrowLeft' || key === 'Left') {
      e.preventDefault();
      // カード内の左移動（0〜4）
      if (activeSubQuestionIdx > 0) {
        setActiveSubQuestion(activeSubQuestionIdx - 1);
      } else {
        // 先頭の場合は前のセットへ
        vocabPrevStep();
      }
    } else if (key === 'ArrowRight' || key === 'Right') {
      e.preventDefault();
      // カード内の右移動（0〜4）
      if (activeSubQuestionIdx < 4) {
        setActiveSubQuestion(activeSubQuestionIdx + 1);
      } else {
        // 末尾の場合は次のセットへ
        vocabNextStep();
      }
    }
  }
});

window.onload = fetchLeapData;
</script>
