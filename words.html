<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEAP Word Master</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* リキッドガラスに調和する淡く高彩度なグラデーションパレット */
  --liquid-blue: linear-gradient(135deg, rgba(37, 99, 235, 0.7), rgba(96, 165, 250, 0.7));
  --liquid-red: linear-gradient(135deg, rgba(239, 68, 68, 0.7), rgba(248, 113, 113, 0.7));
  --liquid-green: linear-gradient(135deg, rgba(16, 185, 129, 0.7), rgba(52, 211, 153, 0.7));
  
  --bg-gradient: radial-gradient(at 10% 10%, rgba(245, 247, 255, 0.95) 0%, transparent 40%),
                 radial-gradient(at 90% 10%, rgba(240, 249, 255, 0.95) 0%, transparent 40%),
                 radial-gradient(at 50% 50%, rgba(255, 255, 255, 1) 0%, transparent 80%),
                 radial-gradient(at 15% 85%, rgba(238, 242, 255, 0.95) 0%, transparent 50%),
                 radial-gradient(at 85% 85%, rgba(224, 242, 254, 0.95) 0%, transparent 50%);
                 
  --text-main: rgba(15, 23, 42, 0.85);
  --text-sub: rgba(71, 85, 105, 0.7);
  --glass-bg: rgba(255, 255, 255, 0.45);
  --glass-border: rgba(255, 255, 255, 0.6);
  --glass-shadow: 0 16px 40px -10px rgba(148, 163, 184, 0.15),
                  0 1px 3px rgba(255, 255, 255, 0.8) inset;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Google Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg-gradient);
  background-attachment: fixed;
  background-color: #f8fafc;
  color: var(--text-main);
  display: flex;
  justify-content: center;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  width: 100%;
  max-width: 800px;
  padding: 40px 24px;
  display: flex;
  flex-direction: column;
}

header {
  text-align: center;
  margin-bottom: 48px;
}

h1 {
  font-size: 36px;
  font-weight: 700;
  margin: 0;
  background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}

/* Loading */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
}

.google-loader {
  width: 56px;
  height: 56px;
  border: 4px solid rgba(255, 255, 255, 0.4);
  border-top: 4px solid rgba(37, 99, 235, 0.8);
  border-radius: 50%;
  animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  box-shadow: var(--glass-shadow);
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Base interactive fluid element */
.interactive-element {
  border-radius: 24px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--glass-shadow);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 18px 32px;
  color: var(--text-main);
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: 16px;
  outline: none;
}

.btn:hover {
  background: rgba(255, 255, 255, 0.7);
  transform: translateY(-4px) scale(1.01);
  box-shadow: 0 20px 48px -5px rgba(148, 163, 184, 0.25),
              0 1px 5px rgba(255, 255, 255, 0.9) inset;
}

.btn:active {
  transform: translateY(-1px);
}

/* Primary Liquid Button (Gradient Text & Subtle Glow) */
.btn-primary {
  border-color: rgba(37, 99, 235, 0.15);
  background: rgba(255, 255, 255, 0.6);
}

.btn-primary span {
  background: var(--liquid-blue);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.35);
  color: var(--text-sub);
}

/* Back navigation */
.back-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-sub);
  font-size: 20px;
}

.back-btn:hover {
  color: var(--text-main);
  background: rgba(255, 255, 255, 0.7);
  transform: scale(1.08) rotate(-90deg);
}

.quit-btn {
  padding: 10px 24px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: rgba(239, 68, 68, 0.8);
  border: 1px solid rgba(239, 68, 68, 0.15);
  background: rgba(255, 255, 255, 0.4);
}

.quit-btn:hover {
  background: rgba(239, 68, 68, 0.08);
  transform: translateY(-2px);
}

/* Fluid Input Fields */
input[type="number"] {
  width: 120px;
  padding: 16px;
  border-radius: 20px;
  color: var(--text-main);
  font-family: inherit;
  font-weight: 600;
  text-align: center;
  font-size: 18px;
  outline: none;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  box-shadow: var(--glass-shadow);
  transition: all 0.4s;
}

input[type="number"]:focus {
  border-color: rgba(37, 99, 235, 0.3);
  background: rgba(255, 255, 255, 0.8);
  transform: translateY(-2px);
}

/* Part Grid (Completely seamless) */
.part-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}

@media (min-width: 600px) {
  .part-grid {
    grid-template-columns: repeat(5, 1fr);
  }
}

.part-btn {
  padding: 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-sub);
  cursor: pointer;
  text-align: center;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  box-shadow: var(--glass-shadow);
  transition: all 0.4s;
}

.part-btn:hover {
  background: rgba(255, 255, 255, 0.7);
  transform: translateY(-2px);
}

.part-btn.active {
  background: rgba(255, 255, 255, 0.8);
  border-color: rgba(37, 99, 235, 0.3);
  color: #2563eb;
  font-weight: 700;
}

.error-text {
  color: rgba(239, 68, 68, 0.9);
  font-size: 13px;
  text-align: center;
  margin-bottom: 12px;
  display: none;
  font-weight: 600;
}

/* Content Area - Seamless Transitions */
.content-section {
  display: flex;
  flex-direction: column;
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-sub);
}

.question-area {
  text-align: center;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  margin-bottom: 40px;
}

.question-text {
  font-size: 42px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Choices Grid */
#choiceContainer {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

@media (min-width: 600px) {
  #choiceContainer {
    grid-template-columns: repeat(2, 1fr);
  }
}

.choice-btn {
  text-align: left;
  padding: 22px 28px;
  font-weight: 600;
  font-size: 16px;
  border-radius: 24px;
  cursor: pointer;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  box-shadow: var(--glass-shadow);
  color: var(--text-main);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  align-items: center;
}

.choice-btn:hover {
  background: rgba(255, 255, 255, 0.7);
  transform: translateY(-4px);
  box-shadow: 0 20px 48px -5px rgba(148, 163, 184, 0.25);
}

.choice-btn.correct {
  background: rgba(16, 185, 129, 0.08) !important;
  color: #059669 !important;
  border-color: rgba(16, 185, 129, 0.3) !important;
  font-weight: 700;
  box-shadow: 0 10px 25px rgba(16, 185, 129, 0.05);
}

.choice-btn.wrong {
  background: rgba(239, 68, 68, 0.08) !important;
  color: #dc2626 !important;
  border-color: rgba(239, 68, 68, 0.3) !important;
  font-weight: 700;
  box-shadow: 0 10px 25px rgba(239, 68, 68, 0.05);
}

/* Typing Input Form */
.typing-input {
  width: 100%;
  padding: 20px;
  border-radius: 24px;
  font-size: 20px;
  text-align: center;
  margin-bottom: 20px;
  outline: none;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  box-shadow: var(--glass-shadow);
  color: var(--text-main);
  transition: all 0.4s;
}

.typing-input:focus {
  border-color: rgba(37, 99, 235, 0.3);
  background: rgba(255, 255, 255, 0.7);
  transform: translateY(-2px);
}

/* Seamless Results Grid */
#resultList {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-top: 32px;
}

@media (min-width: 600px) {
  #resultList {
    grid-template-columns: repeat(2, 1fr);
  }
}

.result-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-radius: 24px;
  border: 1px solid var(--glass-border);
  background: var(--glass-bg);
  box-shadow: var(--glass-shadow);
}

/* Smooth Table Visuals */
.word-table {
  width: 100%;
  border-collapse: collapse;
}

.word-table th {
  text-align: left;
  color: var(--text-sub);
  padding: 20px 16px;
  font-weight: 600;
  font-size: 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.5);
}

.word-table td {
  padding: 22px 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

#wordListScrollArea {
  max-height: 65vh;
  overflow-y: auto;
  padding-right: 8px;
}

#wordListScrollArea::-webkit-scrollbar {
  width: 6px;
}
#wordListScrollArea::-webkit-scrollbar-track {
  background: transparent;
}
#wordListScrollArea::-webkit-scrollbar-thumb {
  background: rgba(0, 0, 0, 0.08);
  border-radius: 10px;
}

.hidden {
  display: none !important;
}

/* Beautiful fading and organic motion */
.fade-in {
  animation: liquidFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes liquidFadeIn {
  from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}
</style>
</head>
<body>
<div class="container">
  <!-- Loading Screen -->
  <div id="loadingScreen" class="loading-screen">
    <div class="google-loader"></div>
    <p id="loadingText" style="margin-top:32px; color:var(--text-sub); font-weight:600; letter-spacing:0.5px;">LEAPデータを読み込み中...</p>
  </div>

  <!-- Start Screen -->
  <div id="startScreen" class="hidden fade-in">
    <header>
      <h1>LEAP 2300</h1>
    </header>
    <div class="content-section">
      <button class="btn interactive-element btn-primary" onclick="startWithRange(1, 2300)">
        <span>すべての単語 (1-2300)</span>
      </button>
      
      <div style="margin-top: 48px;">
        <p style="text-align: center; margin-bottom: 24px; font-weight: 700; color:var(--text-sub); font-size:15px; letter-spacing:0.5px;">範囲を指定して学習</p>
        <div class="part-grid">
          <button class="part-btn" onclick="selectPart(this, 1, 400)">Part 1</button>
          <button class="part-btn" onclick="selectPart(this, 401, 1000)">Part 2</button>
          <button class="part-btn" onclick="selectPart(this, 1001, 1400)">Part 3</button>
          <button class="part-btn" onclick="selectPart(this, 1401, 2000)">Part 4</button>
          <button class="part-btn" onclick="selectPart(this, 2001, 2300)">+α</button>
        </div>
        
        <div style="display:flex; align-items:center; justify-content:center; gap:16px; margin:24px 0 32px 0;">
          <input type="number" id="rangeStart" value="" min="1" placeholder="開始">
          <span style="color:var(--text-sub); font-weight: 700; font-size:18px;">～</span>
          <input type="number" id="rangeEnd" value="" max="2300" placeholder="終了">
        </div>
        
        <div id="rangeError" class="error-text">正しい範囲を入力してください</div>
        <button class="btn interactive-element btn-secondary" onclick="validateRange()">この範囲で進む</button>
      </div>
    </div>
  </div>

  <!-- Mode Select Screen -->
  <div id="modeScreen" class="hidden fade-in">
    <div style="display:flex; align-items:center; margin-bottom: 40px;">
      <button class="back-btn interactive-element" onclick="showScreen('startScreen')">✕</button>
      <h2 id="modeTitle" style="margin:0 0 0 20px; font-size:24px; font-weight:700; letter-spacing:-0.5px;">範囲: 1-100</h2>
    </div>
    
    <div class="content-section">
      <p style="text-align: center; margin-bottom: 12px; font-weight: 700; font-size: 15px; color:var(--text-sub);">問題数</p>
      <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:40px;">
        <input type="number" id="quizCountInput" value="10" min="1">
        <span style="color:var(--text-sub); font-weight: 700; font-size:18px;">問</span>
      </div>
      <div id="countError" class="error-text">範囲内の語数以下を指定してください</div>
      
      <div style="margin-top: 16px;">
        <button class="btn interactive-element btn-primary" onclick="startQuiz('choice')">
          <span>4択テストを開始</span>
        </button>
        <button class="btn interactive-element btn-secondary" onclick="startQuiz('typing')">記述テストを開始</button>
        <button class="btn interactive-element btn-secondary" style="margin-top: 16px; border:none; background:transparent; text-decoration:underline; box-shadow:none; backdrop-filter:none;" onclick="showWordList()">単語一覧を確認</button>
      </div>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" class="hidden fade-in">
    <div class="quiz-header">
      <span id="quizProgress" style="font-size:16px;">1 / 10</span>
      <button class="quit-btn" onclick="quitQuiz()">終了</button>
      <span id="quizScore" style="color:#2563eb; font-size:16px;">正解: 0</span>
    </div>
    
    <div class="question-area">
      <div id="questionText" class="question-text">word</div>
      <div id="questionHint" style="color: var(--text-sub); font-size: 16px; margin-top:12px; font-weight:600; letter-spacing:0.5px;"></div>
    </div>
    
    <div id="choiceContainer">
      <!-- Choices will be injected here -->
    </div>
    
    <div id="typingContainer" class="hidden">
      <input type="text" id="typingInput" class="typing-input" placeholder="英単語を入力" autocomplete="off" spellcheck="false">
      <button class="btn interactive-element btn-primary" id="typingSubmitBtn" onclick="checkTypingAnswer()">
        <span>回答を確定</span>
      </button>
    </div>
    
    <div id="feedbackArea" style="text-align: center; margin-top: 32px; font-weight: 700; font-size: 18px; min-height: 1.5em; letter-spacing:0.5px;"></div>
    <button id="nextBtn" class="btn interactive-element hidden" style="margin-top: 32px; background:rgba(15, 23, 42, 0.9); color:white; border:none;" onclick="nextQuestion()">次へ進む</button>
  </div>

  <!-- Result Summary Screen -->
  <div id="resultScreen" class="hidden fade-in">
    <header>
      <h1 style="font-size:32px;">結果レポート</h1>
    </header>
    
    <div style="margin-bottom:48px; text-align:center;">
      <h2 style="font-size: 36px; margin:0; background: var(--liquid-blue); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing:-1px;" id="finalScore">7 / 10 正解</h2>
    </div>
    
    <div id="resultList">
      <!-- Word summary here -->
    </div>
    
    <div style="margin-top:48px;">
      <button class="btn interactive-element btn-primary" onclick="retryCurrentSet()">
        <span>同じ条件でもう一度挑戦</span>
      </button>
      <button class="btn interactive-element btn-secondary" onclick="showScreen('modeScreen')">メニューに戻る</button>
    </div>
  </div>

  <!-- Word List View -->
  <div id="wordListScreen" class="hidden fade-in">
    <div style="display:flex; align-items:center; margin-bottom: 40px;">
      <button class="back-btn interactive-element" onclick="showScreen('modeScreen')">✕</button>
      <h2 style="margin:0 0 0 20px; font-size:24px; font-weight:700; letter-spacing:-0.5px;">単語リスト</h2>
    </div>
    
    <div class="content-section">
      <div id="wordListScrollArea">
        <table class="word-table">
          <thead>
            <tr>
              <th width="70">No.</th>
              <th>単語</th>
              <th>意味</th>
            </tr>
          </thead>
          <tbody id="wordTableBody">
            <!-- Words will be injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let allWords = [];
let currentPool = [];
let quizSet = [];
let currentIndex = 0;
let score = 0;
let sessionResults = [];
let currentQuizMode = '';
let totalQuestions = 10;

async function fetchLeapData() {
  const targetUrl = "https://ukaru-eigo.com/leap-modified-list/";
  const loadingText = document.getElementById('loadingText');
  
  try {
    const res = await fetch(`https://proxy.cors.sh/${targetUrl}`);
    if (!res.ok) throw new Error();
    const html = await res.text();
    
    if (html && html.includes('tablepress-55')) {
      parseWords(html);
    } else {
      throw new Error();
    }
  } catch (e) {
    loadingText.innerHTML = '<span style="color:rgba(239, 68, 68, 0.9)">データの取得に失敗しました。再読み込みしてください。</span>';
  }
}

function parseWords(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const rows = doc.querySelectorAll('#tablepress-55 tbody tr');
  allWords = Array.from(rows).map(row => {
    const cols = row.querySelectorAll('td');
    return {
      no: parseInt(cols[0].textContent),
      word: cols[1].textContent.trim(),
      meaning: cols[2].textContent.trim()
    };
  }).filter(w => !isNaN(w.no));

  if (allWords.length > 0) {
    showScreen('startScreen');
  } else {
    document.getElementById('loadingText').innerText = "パースエラー: データが見つかりません。";
  }
}

function showScreen(screenId) {
  document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
  document.getElementById(screenId).classList.remove('hidden');
  window.scrollTo(0,0);
}

function selectPart(btn, start, end) {
  const isActive = btn.classList.contains('active');
  document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
  if (isActive) {
    document.getElementById('rangeStart').value = "";
    document.getElementById('rangeEnd').value = "";
  } else {
    btn.classList.add('active');
    document.getElementById('rangeStart').value = start;
    document.getElementById('rangeEnd').value = end;
  }
}

function validateRange() {
  const startVal = document.getElementById('rangeStart').value;
  const endVal = document.getElementById('rangeEnd').value;
  const start = parseInt(startVal);
  const end = parseInt(endVal);
  const error = document.getElementById('rangeError');
  
  if (startVal === "" || endVal === "" || isNaN(start) || isNaN(end) || start < 1 || end > allWords.length || start > end) {
    error.style.display = 'block';
  } else {
    error.style.display = 'none';
    startWithRange(start, end);
  }
}

function startWithRange(start, end) {
  currentPool = allWords.filter(w => w.no >= start && w.no <= end);
  const poolSize = currentPool.length;
  document.getElementById('modeTitle').innerText = `範囲: ${start} - ${end}`;
  const quizCountInput = document.getElementById('quizCountInput');
  quizCountInput.value = poolSize < 10 ? poolSize : 10;
  document.getElementById('countError').style.display = 'none';
  showScreen('modeScreen');
}

function showWordList() {
  const tbody = document.getElementById('wordTableBody');
  const scrollArea = document.getElementById('wordListScrollArea');
  tbody.innerHTML = '';
  currentPool.forEach(w => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="color:var(--text-sub); font-weight:700;">${w.no}</td><td style="font-weight:700; color:#1e40af;">${w.word}</td><td style="font-weight:500; color:var(--text-main);">${w.meaning}</td>`;
    tbody.appendChild(tr);
  });
  showScreen('wordListScreen');
  if (scrollArea) scrollArea.scrollTop = 0;
}

function startQuiz(mode) {
  const countInput = document.getElementById('quizCountInput');
  const count = parseInt(countInput.value);
  const error = document.getElementById('countError');
  if (isNaN(count) || count < 1 || count > currentPool.length) {
    error.style.display = 'block';
    return;
  }
  error.style.display = 'none';
  currentQuizMode = mode;
  totalQuestions = count;
  score = 0;
  currentIndex = 0;
  sessionResults = [];
  quizSet = [...currentPool].sort(() => 0.5 - Math.random()).slice(0, totalQuestions);
  showScreen('quizScreen');
  renderQuestion();
}

function retryCurrentSet() {
  score = 0;
  currentIndex = 0;
  sessionResults = [];
  quizSet = [...currentPool].sort(() => 0.5 - Math.random()).slice(0, totalQuestions);
  showScreen('quizScreen');
  renderQuestion();
}

function quitQuiz() {
  showResults();
}

function renderQuestion() {
  const word = quizSet[currentIndex];
  document.getElementById('quizProgress').innerText = `${currentIndex + 1} / ${totalQuestions}`;
  document.getElementById('quizScore').innerText = `正解: ${score}`;
  document.getElementById('feedbackArea').innerText = '';
  document.getElementById('nextBtn').classList.add('hidden');
  
  if (currentQuizMode === 'choice') {
    document.getElementById('questionText').innerText = word.word;
    document.getElementById('questionHint').innerText = '正しい意味を選んでください';
    document.getElementById('choiceContainer').classList.remove('hidden');
    document.getElementById('typingContainer').classList.add('hidden');
    renderChoices(word);
  } else {
    document.getElementById('questionText').innerText = word.meaning;
    document.getElementById('questionHint').innerText = '英単語を直接綴ってください';
    document.getElementById('choiceContainer').classList.add('hidden');
    document.getElementById('typingContainer').classList.remove('hidden');
    const input = document.getElementById('typingInput');
    input.value = '';
    input.disabled = false;
    input.focus();
    document.getElementById('typingSubmitBtn').disabled = false;
  }
}

function renderChoices(correctWord) {
  const container = document.getElementById('choiceContainer');
  container.innerHTML = '';
  let distractors = allWords
    .filter(w => w.word !== correctWord.word)
    .sort(() => 0.5 - Math.random())
    .slice(0, 3);
  let choices = [...distractors, correctWord].sort(() => 0.5 - Math.random());
  
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerText = choice.meaning;
    btn.onclick = () => checkChoiceAnswer(btn, choice.word === correctWord.word);
    container.appendChild(btn);
  });
}

function checkChoiceAnswer(btn, isCorrect) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.onclick = null);
  const correctWord = quizSet[currentIndex];
  sessionResults.push({ word: correctWord.word, meaning: correctWord.meaning, correct: isCorrect });
  
  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    document.getElementById('feedbackArea').innerHTML = '<span style="color:#059669">● 正解です</span>';
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedbackArea').innerHTML = `<span style="color:#dc2626">✕ 不正解 (正解: ${correctWord.meaning})</span>`;
    btns.forEach(b => {
      if (b.innerText === correctWord.meaning) b.classList.add('correct');
    });
  }
  document.getElementById('nextBtn').classList.remove('hidden');
}

function checkTypingAnswer() {
  const input = document.getElementById('typingInput');
  const userAns = input.value.trim().toLowerCase();
  const correctWord = quizSet[currentIndex];
  const isCorrect = userAns === correctWord.word.toLowerCase();
  input.disabled = true;
  document.getElementById('typingSubmitBtn').disabled = true;
  sessionResults.push({ word: correctWord.word, meaning: correctWord.meaning, correct: isCorrect });
  
  if (isCorrect) {
    score++;
    document.getElementById('feedbackArea').innerHTML = '<span style="color:#059669">● 正解です</span>';
  } else {
    document.getElementById('feedbackArea').innerHTML = `<span style="color:#dc2626">✕ 不正解 (正解: ${correctWord.word})</span>`;
  }
  document.getElementById('nextBtn').classList.remove('hidden');
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex < totalQuestions) {
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  showScreen('resultScreen');
  const answeredCount = sessionResults.length;
  document.getElementById('finalScore').innerText = `${answeredCount}問中 ${score}問 正解`;
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  
  sessionResults.forEach(res => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <div>
        <div style="font-weight:700; font-size:18px; color:#1e40af;">${res.word}</div>
        <div style="font-size:13px; color:var(--text-sub); font-weight:600; margin-top:4px;">${res.meaning}</div>
      </div>
      <div style="font-size: 22px; font-weight: 700; color: ${res.correct ? '#059669' : '#dc2626'}">
        ${res.correct ? '●' : '✕'}
      </div>
    `;
    list.appendChild(div);
  });
  
  if (answeredCount === 0) {
    list.innerHTML = '<p style="text-align:center; color:var(--text-sub); font-weight:600;">まだ回答した問題はありません。</p>';
  }
}

document.getElementById('typingInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !document.getElementById('typingSubmitBtn').disabled) {
    checkTypingAnswer();
  } else if (e.key === 'Enter' && !document.getElementById('nextBtn').classList.contains('hidden')) {
    nextQuestion();
  }
});

window.onload = fetchLeapData;
</script>
</body>
</html>
